<style>

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    margin: 0;
    background: #0a0506;
    background-image:
      radial-gradient(ellipse at center, #2c1810 0%, #0a0506 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: 'Press Start 2P', monospace;
    color: #d4af37;
    padding: 20px;
    gap: 15px;
  }
  #title-bar {
    font-size: 12px;
    letter-spacing: 6px;
    text-shadow: 3px 3px 0 #000, 0 0 10px #d4af37;
  }
  #tv-frame {
    background: linear-gradient(180deg, #5a4030 0%, #3a2010 50%, #2a1505 100%);
    padding: 35px 30px;
    border-radius: 80px 80px 20px 20px;
    box-shadow:
      inset 0 0 60px rgba(0,0,0,0.8),
      0 0 80px rgba(212, 175, 55, 0.2),
      0 20px 50px rgba(0,0,0,0.9);
    position: relative;
  }
  #tv-frame::after {
    content: '';
    position: absolute;
    bottom: 12px; left: 50%; transform: translateX(-50%);
    width: 40px; height: 10px;
    background: #1a0f08; border-radius: 5px;
  }
  #screen {
    background: #000;
    border: 8px solid #0a0506;
    border-radius: 30px;
    overflow: hidden;
    box-shadow: inset 0 0 50px rgba(0,0,0,0.5), 0 0 0 2px #d4af37;
    line-height: 0;
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    image-rendering: crisp-edges;
    width: 800px;   /* overridden by resizeGame() */
    height: 600px;
  }
  #controls {
    font-size: 9px;
    letter-spacing: 2px;
    text-align: center;
    line-height: 1.6;
  }
  .key {
    color: #ff6b6b;
    background: rgba(0,0,0,0.5);
    padding: 4px 8px;
    border: 1px solid #d4af37;
    border-radius: 3px;
  }
</style>

// === DRAWING FUNCTIONS ===
function drawSprite(sprite, x, y, scale, colorMap = C, outline = false) {
  const maxWidth = Math.max(...sprite.map(r => r.length));
  const isFilled = (r, c) => {
    if (r < 0 || r >= sprite.length || c < 0) return false;
    const ch = (sprite[r] || '')[c];
    return ch && ch !== '.' && ch !== ' ' && colorMap[ch];
  };
  // Pass 1: bold Super-Mario-style outline around the silhouette (8-neighbourhood)
  if (outline) {
    const oc = (typeof outline === 'string') ? outline : '#10101c';
    ctx.fillStyle = oc;
    for (let row = 0; row < sprite.length; row++) {
      for (let col = 0; col < maxWidth; col++) {
        if (isFilled(row, col)) continue;
        let near = false;
        for (let dr = -1; dr <= 1 && !near; dr++)
          for (let dc = -1; dc <= 1; dc++)
            if (isFilled(row + dr, col + dc)) { near = true; break; }
        if (near) ctx.fillRect(Math.floor(x + col * scale), Math.floor(y + row * scale), scale, scale);
      }
    }
  }
  // Pass 2: fills
  for (let row = 0; row < sprite.length; row++) {
    const line = sprite[row].padEnd(maxWidth, '.');
    for (let col = 0; col < line.length; col++) {
      const ch = line[col];
      if (ch === '.' || ch === ' ') continue;
      const color = colorMap[ch];
      if (color) {
        ctx.fillStyle = color;
        ctx.fillRect(Math.floor(x + col * scale), Math.floor(y + row * scale), scale, scale);
      }
    }
  }
}
function fillRect(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.floor(x), Math.floor(y), Math.floor(w), Math.floor(h));
}
function drawText(text, x, y, color, size = 2, align = 'left', shadow = true) {
  ctx.font = `${size * 8}px "Press Start 2P", monospace`;
  ctx.textAlign = align;
  ctx.textBaseline = 'top';
  if (shadow) {
    ctx.fillStyle = '#000';
    ctx.fillText(text, Math.floor(x) + size, Math.floor(y) + size);
  }
  ctx.fillStyle = color;
  ctx.fillText(text, Math.floor(x), Math.floor(y));
}
function wrapText(text, maxChars) {
  const paragraphs = text.split('\n');
  const lines = [];
  for (const para of paragraphs) {
    if (para === '') { lines.push(''); continue; }
    const words = para.split(' ');
    let current = '';
    for (const word of words) {
      const test = current ? current + ' ' + word : word;
      if (test.length > maxChars) {
        if (current) lines.push(current);
        current = word;
      } else {
        current = test;
      }
    }
    if (current) lines.push(current);
  }
  return lines;
}

// === PURE DECISION LOGIC (no side effects; testable via window.Cecilia) ===
function blankGS() {
  return {
    stats:   { hearts: 0, gold: 10000, virtue: 6 },
    suitors: { delvile: 0, monckton: 0, floyer: 0, arnott: 0 },
    flags:   { mrsDelvileApproval: false, agreedSecretMarriage: false, kindToArnott: false,
               sympathizedWithHarrel: false, encouragedFloyer: false, gaveMoneyToHarrel: false,
               caughtDelvile: false }
  };
}
// Charity gift: worthy lifts virtue at small cost; vice/Harrel costs more and corrodes virtue.
function applyGift(gs, kind, cost) {
  if (kind === 'worthy')        { gs.stats.gold = Math.max(0, gs.stats.gold - (cost == null ? 25 : cost)); gs.stats.virtue += 1; }
  else if (kind === 'unworthy') { gs.stats.gold = Math.max(0, gs.stats.gold - (cost == null ? 1500 : cost)); gs.stats.virtue -= 1; }
  clampVirtue(gs);
  return gs;
}
// Virtue is a 0..6 gauge: clamp after any change so the 6 HUD pips stay honest.
function clampVirtue(gs) { gs.stats.virtue = Math.max(0, Math.min(6, gs.stats.virtue)); }
// LOVE is a 0..5 gauge (HUD shows 5 heart slots): clamp after any change.
function clampHearts(gs) { gs.stats.hearts = Math.max(0, Math.min(5, gs.stats.hearts)); }
// Breaking point: lost virtue OR squandered fortune means a failed chase is lethal.
// (hearts no longer gates this — the chase runs for everyone now; see resolveChase)
function shouldBreakDown(gs) {
  return gs.stats.virtue <= 2 || gs.stats.gold <= 3000;
}
// Stage 2 wish menu -> ending key.
function resolveWish(wish, gs) {
  const s = gs.stats, su = gs.suitors, f = gs.flags;
  switch (wish) {
    case 'delvile':
      return (f.mrsDelvileApproval && s.hearts >= 2 && (su.delvile >= 4 || f.agreedSecretMarriage || f.caughtDelvile)) ? 'true_love' : 'name_condition';
    case 'independence':
      // Gold is in real pounds (fortune starts at £10,000). Independence = keeping the bulk of it:
      // £9000+ tolerates modest alms to the worthy (£25 each) but not a Harrel bailout or spendthrift indulgence.
      return (s.gold >= 9000 && s.virtue >= 4) ? 'independence' : 'faded';
    case 'arnott':
      return (su.arnott >= 2 || f.kindToArnott) ? 'fortune_married' : 'quiet_spinster';
    case 'monckton':
      return 'ruin';
    default:
      return 'faded';
  }
}
// Stage 1 chase outcome -> ending key. `caught` = reached Delvile in the chase.
function resolveBreakpoint(caught, gs) {
  if (caught) return 'survival';
  const su = gs.suitors, f = gs.flags;
  const redeemable = (su.delvile >= 4 || f.agreedSecretMarriage) && f.mrsDelvileApproval;
  return redeemable ? 'survival' : 'death';
}
// Chase outcome routing: the chase ALWAYS plays. Catching Delvile, or merely
// not being in breakdown, means she survives and proceeds to the wish menu.
// Only a broken-and-unredeemable player who fails the chase dies.
function resolveChase(caught, gs) {
  if (caught) return 'wish';
  if (!shouldBreakDown(gs)) return 'wish';
  return resolveBreakpoint(false, gs) === 'death' ? 'death' : 'wish';
}
// Chase catchability: higher = easier to catch Delvile. Range roughly [0.5, ~3].
function chaseDifficulty(gs) {
  const su = gs.suitors, f = gs.flags, s = gs.stats;
  let c = 0.8;
  c += su.delvile * 0.25;
  if (f.agreedSecretMarriage) c += 0.4;
  if (f.mrsDelvileApproval) c += 0.3;
  c += Math.min(s.virtue, 6) * 0.05;
  c += Math.min(s.gold, 12000) * 0.00003;
  c += Math.min(s.hearts, 5) * 0.15;   // love makes her press harder after him
  return Math.max(0.5, c);
}
// Resolve a scene's text whether it's a string or a function of game state.
function resolveSceneText(scene, gs) {
  return (typeof scene.text === 'function') ? scene.text(gs) : (scene.text || '');
}
// Filter a scene's choices by optional condition(gs).
function visibleChoices(scene, gs) {
  if (!scene.choices) return null;
  return scene.choices.filter(ch => !ch.condition || ch.condition(gs));
}
function gameState() { return { stats, suitors, flags }; }

function chooseEnding(type) {
  currentEndingType = type;
  state = 'ending';
  currentScene = { ...ENDINGS[type] };
  fullText = currentScene.text;
  textIdx = 0;
  displayText = '';
  playSound('victory');
}
function setupScene() {
  if (state === 'ending') return;
  // Skip any scene whose condition(gs) is false.
  while (currentSceneIdx < SCENES.length) {
    const sc = SCENES[currentSceneIdx];
    if (sc.condition && !sc.condition(gameState())) { currentSceneIdx++; continue; }
    break;
  }
  if (currentSceneIdx >= SCENES.length) return;
  currentScene = SCENES[currentSceneIdx];
  if (currentScene.type === 'title') return;
  fullText = resolveSceneText(currentScene, gameState());
  textIdx = 0;
  displayText = '';
  choiceIdx = 0;
}

  stats = { hearts: 0, gold: 10000, virtue: 6 };

}

// === SOUND ===
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function tone(freq, dur, type = 'square', vol = 0.08) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + dur);
}
function playSound(type) {
  switch (type) {
    case 'select': tone(440, 0.08, 'square', 0.06); setTimeout(()=>tone(660,0.05,'square',0.06),60); break;
    case 'coin':
      tone(988, 0.05, 'square', 0.06);
      setTimeout(() => tone(1319, 0.15, 'square', 0.06), 50);
      break;
    case 'jump':
      tone(220, 0.1, 'square', 0.06);
      setTimeout(() => tone(660, 0.05, 'square', 0.06), 50);
      break;
    case 'hurt':
      tone(440, 0.05, 'sawtooth', 0.1);
      setTimeout(() => tone(220, 0.2, 'sawtooth', 0.1), 50);
      break;
    case 'victory':
      [523, 659, 784, 1047, 1319].forEach((f, i) => setTimeout(() => tone(f, 0.2, 'square', 0.08), i * 100));
      break;
    case 'type':
      tone(800 + Math.random() * 200, 0.02, 'square', 0.025);
      break;
  }
}

// === BAROQUE BACKGROUND MUSIC (original, in the style of Handel's Giulio Cesare) ===
let musicOn = true;
const NF = { // note frequencies (Hz)
  D3:146.83, E3:164.81, Fs3:185.00, G3:196.00, A3:220.00, B3:246.94,
  D4:293.66, E4:329.63, Fs4:369.99, G4:392.00, A4:440.00, B4:493.88, Cs5:554.37,
  D5:587.33, E5:659.25
};
const MSPB = 60 / 100; // 100 BPM, stately
// Melody: a D-major aria with Baroque dotted figures and a cadential turn.
const MELODY = [
  ['D4',1],['E4',1],['Fs4',1],['G4',1],
  ['A4',1.5],['G4',0.5],['Fs4',1],['E4',1],
  ['Fs4',1],['A4',1],['D5',1],['Cs5',1],
  ['B4',2],['A4',2],
  ['B4',1],['A4',1],['G4',1],['Fs4',1],
  ['A4',1],['G4',1],['Fs4',1],['E4',1],
  ['G4',1],['Fs4',1],['E4',1],['A4',1],
  ['Fs4',1],['E4',1],['D4',2]
];
// Basso continuo: half-note roots/fifths supporting the harmony.
const BASS = [
  ['D3',2],['A3',2], ['A3',2],['E3',2], ['B3',2],['Fs3',2], ['A3',2],['E3',2],
  ['G3',2],['D3',2], ['Fs3',2],['D3',2], ['G3',2],['A3',2], ['A3',2],['D3',2]
];
function buildTrack(seq){ let t=0; const ev=[]; for(const [n,d] of seq){ ev.push({f:NF[n], t, d:d*MSPB}); t+=d*MSPB; } return {ev, len:t}; }
const M_TRACK = buildTrack(MELODY), B_TRACK = buildTrack(BASS);
const M_LOOP = Math.max(M_TRACK.len, B_TRACK.len);
function musicNote(freq, start, dur, type, vol){
  if(!audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(0.0001, start);
  g.gain.exponentialRampToValueAtTime(vol, start + 0.012);   // quick harpsichord-like pluck
  g.gain.exponentialRampToValueAtTime(0.0001, start + dur * 0.95);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(start); o.stop(start + dur + 0.02);
}
let mBar = 0, mIdx = 0, bIdx = 0;
function scheduleMusic(){
  if(!audioCtx || audioCtx.state !== 'running' || !musicOn) return;
  const ahead = audioCtx.currentTime + 0.3;
  if(mBar === 0) mBar = audioCtx.currentTime + 0.15;
  while(mIdx < M_TRACK.ev.length && mBar + M_TRACK.ev[mIdx].t < ahead){
    const e = M_TRACK.ev[mIdx]; musicNote(e.f, mBar + e.t, e.d, 'triangle', 0.05); mIdx++;
  }
  while(bIdx < B_TRACK.ev.length && mBar + B_TRACK.ev[bIdx].t < ahead){
    const e = B_TRACK.ev[bIdx]; musicNote(e.f, mBar + e.t, e.d, 'square', 0.03); bIdx++;
  }
  if(mIdx >= M_TRACK.ev.length && bIdx >= B_TRACK.ev.length){ mBar += M_LOOP; mIdx = 0; bIdx = 0; }
}
setInterval(scheduleMusic, 60);

    // Never two spendthrifts back-to-back, and keep them a touch rarer, so the
    // player always has a clear stretch to land and line up the next jump.
    const vice = !prevVice && Math.random() < 0.45;
    if (vice) {
      mg.targets.push({ x, y: 360, w: 56, h: 60, kind: 'unworthy', who: unworthy[ui++ % unworthy.length], cost: 1000 + Math.round(Math.random() * 3) * 500, hit: false });
    } else {
      mg.targets.push({ x, y: 380, w: 44, h: 44, kind: 'worthy', who: worthy[wi++ % worthy.length], cost: 25, given: false });
    }
    // Wider gaps overall, and extra run-up right after a spendthrift.
    x += (vice ? 460 : 340) + Math.random() * 120;
    prevVice = vice;
  }
}
const TARGET_NAME = { family: 'POOR FAMILY', hills: 'THE HILLS', beggar: 'A BEGGAR', hospital: 'HOSPITAL', harrel: 'MR. HARREL', gaming: 'GAMING DEN', fop: 'A FOP' };
function updateMinigame() {
  if (mg.finished) return;
  mg.levelTime++;
  // Movement
  if (keys['ArrowRight'] || keys['KeyD']) {
    mg.player.vx = Math.min(mg.player.vx + 0.6, 4.5);
  } else if (keys['ArrowLeft'] || keys['KeyA']) {
    mg.player.vx = Math.max(mg.player.vx - 0.6, -3);
  } else {
    mg.player.vx *= 0.75;
  }
  // Jump (with double jump)
  if (keyPressed('Space') || keyPressed('ArrowUp') || keyPressed('KeyW')) {
    if (mg.player.onGround) {
      mg.player.vy = -12;
      mg.player.onGround = false;
      mg.player.jumpCount = 1;
      playSound('jump');
    } else if (mg.player.jumpCount < 2) {
      mg.player.vy = -10;
      mg.player.jumpCount++;
      playSound('jump');
    }
  }
  // Gravity
  mg.player.vy += 0.6;
  if (mg.player.vy > 15) mg.player.vy = 15;
  mg.player.x += mg.player.vx;
  mg.player.y += mg.player.vy;
  // Ground
  if (mg.player.y > 380) {
    mg.player.y = 380;
    mg.player.vy = 0;
    mg.player.onGround = true;
    mg.player.jumpCount = 0;
  }
  // Bounds
  if (mg.player.x < 50) { mg.player.x = 50; mg.player.vx = 0; }
  // GIVE: Down / S to a WORTHY cause she is standing beside (alms = £25, +virtue)
  if (keyPressed('ArrowDown') || keyPressed('KeyS')) {
    for (const t of mg.targets) {
      if (t.given || t.kind !== 'worthy') continue;
      if (Math.abs((mg.player.x + 12) - (t.x + t.w / 2)) < 50 && stats.gold > 0) {
        t.given = true;
        applyGift(gameState(), 'worthy', t.cost);
        mg.given++;
        playSound('coin');
        break;
      }
    }
  }
  // SPENDTHRIFTS are obstacles: JUMP over them. Colliding lets them seize money (and virtue).
  // Forgiving hitbox: insets on both sides (so brushing past the edge is safe) and the
  // top ~22px of the figure is clippable, so the jump only has to clear the lower body.
  for (const t of mg.targets) {
    if (t.kind !== 'unworthy' || t.hit) continue;
    if (mg.player.x + 24 > t.x + 12 && mg.player.x + 6 < t.x + t.w - 12 && mg.player.y + 56 > t.y + 22) {
      t.hit = true;
      stats.gold = Math.max(0, stats.gold - t.cost);
      stats.virtue = Math.max(0, stats.virtue - 1);
      mg.player.vy = -7; mg.player.vx = -3;   // knocked back
      playSound('hurt');
    }
  }
  // Finish
  if (mg.player.x > mg.endX) {
    mg.player.x = mg.endX;
    mg.finished = true;
    mg.result = 'done';
    playSound('victory');
  }
  mg.scrollX = mg.player.x - 200;
}

// A Georgian 6-over-6 sash window: stone surround, white frame, pale glass, glazing bars.
function drawSashWindow(x, y, w, h) {
  fillRect(x - 3, y - 3, w + 6, h + 6, C.K);   // stone surround
  fillRect(x, y, w, h, C.w);                    // white sash frame
  fillRect(x + 2, y + 2, w - 4, h - 4, C.l);    // pale glass
  fillRect(x + w / 2 - 1, y + 2, 2, h - 4, C.w);          // central glazing bar
  fillRect(x + 2, y + Math.round(h / 3) - 1, w - 4, 2, C.w);
  fillRect(x + 2, y + Math.round(2 * h / 3) - 1, w - 4, 2, C.w);
}

function drawDialogue(scene) {
  if (!scene || (!scene.speaker && !scene.text)) return;
  const boxTop = 322, boxH = H - boxTop;   // taller box: 322..600
  const boxY = boxTop;
  fillRect(0, boxY, W, boxH, C.k);
  fillRect(0, boxY, W, 4, C.w);
  fillRect(0, boxY + boxH - 4, W, 4, C.w);
  fillRect(0, boxY, 4, boxH, C.w);
  fillRect(W - 4, boxY, 4, boxH, C.w);
  if (scene.speaker) {
    fillRect(20, boxY - 34, 360, 40, C.w);
    fillRect(25, boxY - 29, 350, 30, C.k);
    drawText(scene.speaker, 34, boxY - 22, C.g, 1.5, 'left', false);
  }
  const SIZE = 2, lineH = 30, maxChars = 44, padX = 30;
  const hasChoices = !!(scene.choices && visibleChoices(scene, gameState()).length);
  const lines = wrapText(displayText, maxChars);
  if (hasChoices) {
    // spoken line pinned to the top; choices go beneath it (never overlapping)
    const textTop = boxY + 22;
    for (let i = 0; i < lines.length; i++) {
      drawText(lines[i], padX, textTop + i * lineH, C.w, SIZE, 'left', false);
    }
    const fullLines = wrapText(fullText, maxChars).length;   // stable position even mid-typing
    choiceStartY = textTop + fullLines * lineH + 16;
  } else {
    // narration: vertically center the block so the box isn't half-empty
    const blockH = lines.length * lineH;
    const textTop = boxY + Math.max(22, (boxH - blockH) / 2 - 8);
    for (let i = 0; i < lines.length; i++) {
      drawText(lines[i], padX, textTop + i * lineH, C.w, SIZE, 'left', false);
    }
    if (textIdx >= fullText.length && Math.floor(frame / 30) % 2 === 0) {
      drawText('PRESS SPACE', W - 230, boxY + boxH - 36, C.g, 1.5, 'left', false);
    }
  }
}

// A themed strip of ground for the speaker to stand on, filling the gap between
// their feet (baseline) and the top of the dialogue box so they don't float.
function drawSpeakerGround(bg, top) {
  const bottom = 322;                 // meets the dialogue box
  const h = bottom - top;
  let face, edge, tex;
  switch (bg) {
    case 'garden':
    case 'manor':   face = C.v; edge = C.h;    tex = C.d; break;  // lawn / grass
    case 'london':  face = C.o; edge = C['+']; tex = C.k; break;  // stone pavement
    case 'storm':   face = C.u; edge = C.o;    tex = C.k; break;  // wet flagstones
    case 'ballroom':
    default:        face = C.t; edge = C.q;    tex = C.a; break;  // polished wood
  }
  fillRect(0, top, W, h, face);
  fillRect(0, top, W, 4, edge);                         // lit front edge of the floor
  if (bg === 'garden' || bg === 'manor') {
    for (let x = 0; x < W; x += 14) fillRect(x, top, 3, 5, tex);          // grass blades
  } else if (bg === 'london' || bg === 'storm') {
    fillRect(0, top + Math.floor(h / 2), W, 2, tex);                      // course joint
    for (let x = 18; x < W; x += 40) fillRect(x, top + 5, 2, h - 5, tex); // cobble seams
  } else {
    for (let x = 0; x < W; x += 48) fillRect(x, top + 5, 2, h - 5, tex);  // plank seams
  }
}

// Soft oval contact shadow so the figure reads as planted on the floor.
function drawContactShadow(cx, cy, spriteW) {
  ctx.save();
  ctx.globalAlpha = 0.28;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(cx, cy, spriteW * 0.42, 7, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// A single hand-scrawled "IOU" debt note (cream paper, ruled line, red lettering).
function drawIOUNote(cx, cy, rot) {
  const w = 34, h = 22;
  ctx.save();
  ctx.translate(Math.floor(cx), Math.floor(cy));
  ctx.rotate(rot);
  ctx.fillStyle = '#10101c'; ctx.fillRect(-w/2 - 2, -h/2 - 2, w + 4, h + 4); // outline
  ctx.fillStyle = C.c;       ctx.fillRect(-w/2, -h/2, w, h);                 // paper
  ctx.fillStyle = C.a;       ctx.fillRect(w/2 - 6, -h/2, 6, 6);             // folded corner
  ctx.fillStyle = C.q;       ctx.fillRect(-w/2 + 4, h/2 - 6, w - 8, 2);     // ruled line
  ctx.fillStyle = C.F;
  ctx.font = '9px "Press Start 2P", monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('IOU', 0, -2);
  ctx.restore();
}

// Harrel the spendthrift is hemmed in by his debts: notes drift around him,
// some behind, a couple fluttering at his feet in front of the figure.
function drawHarrelIOUs(front) {
  // [x, y, baseRot, isFront]
  const notes = [
    [322, 182, -0.26, false], [482, 170, 0.22, false],
    [330, 244, 0.16, false],  [474, 236, -0.18, false],
    [300, 208, 0.30, false],  [498, 206, -0.30, false],
    [362, 296, -0.12, true],  [442, 300, 0.16, true],
  ];
  for (let i = 0; i < notes.length; i++) {
    const [nx, ny, br, isFront] = notes[i];
    if (isFront !== front) continue;
    const driftY = Math.sin(frame * 0.04 + i) * 3;
    const wobble = Math.sin(frame * 0.03 + i) * 0.08;
    drawIOUNote(nx, ny + driftY, br + wobble);

}

function drawCharacter(charName) {
  if (!charName || !SP[charName]) return;
  const sprite = SP[charName];
  const maxW = Math.max(...sprite.map(r => r.length));
  const scale = 5;
  const x = (W - maxW * scale) / 2;
  // Stand every speaker on a common floor just above the dialogue box's speaker
  // label (label sits at ~288; box top is 322), so short (28-row) and tall
  // (32-row) sprites share a baseline and clear the box. Slight idle bob.
  const baseline = 284;
  const y = baseline - sprite.length * scale + Math.sin(frame * 0.05) * 1;
  drawSpeakerGround(currentScene.bg, baseline - 2);
  drawContactShadow(W / 2, baseline, maxW * scale);
  if (charName === 'harrel') drawHarrelIOUs(false);   // notes behind the figure
  drawSprite(sprite, x, y, scale, C, true);
  if (charName === 'harrel') drawHarrelIOUs(true);    // notes fluttering in front
}

  fillRect(0, 410, 6000, 20, C.v);
  for (let x = 0; x < 6000; x += 60) {
    fillRect(x, 440, 60, 4, C.j);
    fillRect(x + 30, 460, 30, 4, C.j);
  }
  // Targets — each clearly labelled so the player knows who deserves charity
  for (const t of mg.targets) {
    const bob = Math.sin(mg.levelTime * 0.1 + t.x) * 3;
    const name = TARGET_NAME[t.who] || '';
    if (t.kind === 'worthy') {
      // a small, humble figure (brown), with a GREEN "worthy" label
      fillRect(t.x, t.y + bob, 28, 36, t.given ? C.u : C.a);
      fillRect(t.x + 6, t.y + bob - 8, 16, 12, t.given ? C.u : C.s);
      if (!t.given) {
        fillRect(t.x - 14, t.y + bob - 62, 96, 48, C.d);          // green banner
        fillRect(t.x - 14, t.y + bob - 62, 96, 3, C.h);
        drawText('WORTHY', t.x - 8, t.y + bob - 58, C.h, 1, 'left', false);
        drawText(name, t.x - 10, t.y + bob - 44, C.w, 1, 'left', false);
        drawText('GIVE £25', t.x - 10, t.y + bob - 28, C.g, 1, 'left', false);
      } else {
        drawText('✓', t.x + 8, t.y + bob - 22, C.h, 1, 'left', false);
      }
    } else {
      // a gaudy figure (purple/gold) — an OBSTACLE to jump over; colliding robs her
      fillRect(t.x, t.y + bob, 44, 48, t.hit ? C.u : C.m);
      fillRect(t.x + 8, t.y + bob - 10, 28, 14, t.hit ? C.u : C.x);
      if (!t.hit) {
        fillRect(t.x - 16, t.y + bob - 66, 138, 52, C.I);         // red banner
        fillRect(t.x - 16, t.y + bob - 66, 138, 3, C.r);
        drawText('SPENDTHRIFT', t.x - 12, t.y + bob - 62, C.r, 1, 'left', false);
        drawText(name, t.x - 12, t.y + bob - 46, C.w, 1, 'left', false);
        drawText('JUMP! £' + t.cost.toLocaleString('en-GB'), t.x - 12, t.y + bob - 30, C.x, 1, 'left', false);
      }
    }
  }
  // Player
  const px = Math.floor(mg.player.x);
  const py = Math.floor(mg.player.y);
  drawSprite(SP.ceciliaRun, px, py + (mg.player.onGround && Math.abs(mg.player.vx) > 0.5 ? Math.sin(mg.levelTime * 0.3) : 0), 3);
  // End marker
  fillRect(mg.endX, 200, 6, 210, C.L);
  fillRect(mg.endX + 6, 210, 60, 40, C.v);
  drawText('HOME', mg.endX + 10, 220, C.w, 1, 'left', false);
  ctx.restore();
  // UI: virtue + gold
  drawText('VIRTUE', 20, 60, C.h, 1, 'left', false);
  for (let i = 0; i < 6; i++) fillRect(90 + i * 18, 55, 14, 18, i < stats.virtue ? C.v : C.u);
  drawText('GOLD', 20, 100, C.g, 1, 'left', false);
  drawText(fmtGold(stats.gold), 90, 100, C.g, 1, 'left', false);
  fillRect(W - 280, 60, 250, 25, C.k);
  fillRect(W - 278, 62, 246, 21, C.u);
  fillRect(W - 278, 62, 246 * Math.min(mg.player.x / mg.endX, 1), 21, C.v);
  drawText('THE STREET', W - 275, 65, C.w, 1, 'left', false);
  // instruction banner: tell the player exactly who to give to
  fillRect(W / 2 - 300, 18, 600, 24, C.k);
  fillRect(W / 2 - 300, 18, 600, 3, C.w);
  drawText('GIVE TO THE WORTHY (GREEN, DOWN)   -   JUMP OVER SPENDTHRIFTS (RED)', W / 2, 25, C.w, 1, 'center');
  drawText('←→ WALK   ↓/S GIVE   SPACE JUMP', W / 2, H - 25, C.c, 1, 'center');
}

// === DELIRIUM CHASE ===
let chase = null;
function initChase() {
  const diff = chaseDifficulty(gameState());
  chase = {
    phase: 1,                 // 1 = carriage, 2 = foot
    t: 0,
    laneY: 300,               // Cecilia's carriage vertical position
    gap: 320,                 // distance to Delvile's carriage; smaller = closer
    obstacles: [],
    nextObs: 60,
    reach: 0,                 // phase 2: progress toward Delvile (0..100)
    overtaken: 0,             // phase 2: pursuers closing (0..100)
    diff,                     // catchability factor
    finished: false,
    caught: false,
    outcome: null
  };
}
function updateChase() {
  if (chase.finished) return;
  chase.t++;
  if (chase.phase === 1) {
    // Steer up/down to dodge; Delvile lingers more when diff is high (he half-wants to be caught).
    if (keys['ArrowUp'] || keys['KeyW']) chase.laneY = Math.max(120, chase.laneY - 4);
    if (keys['ArrowDown'] || keys['KeyS']) chase.laneY = Math.min(440, chase.laneY + 4);
    // Spawn obstacles
    if (--chase.nextObs <= 0) {
      chase.obstacles.push({ x: W + 20, y: 120 + Math.random() * 320, w: 40, h: 40, hit: false });
      chase.nextObs = 50 + Math.random() * 40;
    }
    for (const o of chase.obstacles) {
      o.x -= 6;
      if (!o.hit && o.x < 90 && o.x + o.w > 40 && Math.abs(o.y - chase.laneY) < 40) {
        o.hit = true; chase.gap += 40; chase.shakeUntil = chase.t + 18; playSound('hurt');   // crash widens the gap
      }
    }
    chase.obstacles = chase.obstacles.filter(o => o.x > -50);
    // Clean driving slowly closes the gap; lingering scales with diff.
    chase.gap -= 0.5 * chase.diff;
    if (chase.gap <= 0) { chase.phase = 2; playSound('select'); }     // caught up -> foot chase
    if (chase.t > 60 * 30) { chase.phase = 2; }                       // safety: cap phase 1 at ~30s
  } else {
    // Phase 2: mash Right/Space to reach him before the crowd overtakes her.
    if (keyPressed('ArrowRight') || keyPressed('Space') || keyPressed('KeyD')) chase.reach += 2.2;
    chase.reach += 0.25 * (chase.diff - 0.8);            // love makes him linger within reach
    chase.overtaken += 0.45;                             // pursuers always closing
    chase.reach = Math.max(0, chase.reach);
    if (chase.reach >= 100) { chase.caught = true; chase.finished = true; }
    else if (chase.overtaken >= 100) { chase.caught = false; chase.finished = true; }
    if (chase.finished) {
      if (chase.caught) flags.caughtDelvile = true;
      chase.outcome = resolveChase(chase.caught, gameState());
      playSound(chase.caught ? 'victory' : 'hurt');
    }
  }
}
function chaseResultEnding() { return chase ? chase.outcome : null; }
// --- chase art helpers (resolution-relative) ---
function drawHorse(x, y, t, s) {
  const step = Math.sin(t * 0.4) > 0 ? 1 : -1;   // two-stride gallop
  fillRect(x, y, 18*s, 8*s, C.a);                 // body
  fillRect(x + 17*s, y - 4*s, 6*s, 8*s, C.a);     // neck
  fillRect(x + 22*s, y - 2*s, 7*s, 5*s, C.a);     // head
  fillRect(x + 16*s, y - 5*s, 3*s, 6*s, C.k);     // mane
  fillRect(x - 3*s, y + 1*s, 4*s, 7*s, C.k);      // tail
  fillRect(x + 4*s, y + 8*s, 3*s, 8*s + step*2*s, C.L);   // foreleg
  fillRect(x + 14*s, y + 8*s, 3*s, 8*s - step*2*s, C.L);  // hindleg
}
function drawCarriageRig(x, cabY, t, who, facing) {
  const s = Math.max(2, Math.round(H / 120));
  drawHorse(x + facing*30*s, cabY + 10*s, t, s);                    // team out front (in travel direction)
  fillRect(x + (facing > 0 ? 26*s : -2*s), cabY + 12*s, 2*s, 26*s, C.k); // pole
  fillRect(x, cabY, 30*s, 20*s, who === 'cecilia' ? C.P : C.L);     // cab body
  fillRect(x + 2*s, cabY + 4*s, 6*s, 6*s, C.e);                     // lit side lamp
  for (const wx of [x + 4*s, x + 24*s]) {                            // spoked wheels
    fillRect(wx, cabY + 20*s, 8*s, 8*s, C.k);
    fillRect(wx + 2*s, cabY + 22*s, 4*s, 4*s, C.o);
  }
  const sp = who === 'cecilia' ? SP.cecilia : SP.delvile;           // recognizable occupant
  drawSprite(sp, x + 6*s, cabY - 14*s, Math.max(2, s - 1), C, true);
}
function drawNightStreet(t) {
  fillRect(0, 0, W, H, C.n);                                   // night sky
  fillRect(W - 80, 30, 30, 30, C.c);                          // moon
  for (let i = 0; i < 6; i++) fillRect(i * (W/6), H*0.45, W/6 - 8, H*0.22, C.u); // terrace
  fillRect(W*0.55, H*0.30, 16, 40, C.u);                      // church steeple
  for (let i = 0; i < 8; i++) fillRect(20 + i*(W/8), H*0.5 + (i%2)*12, 6, 8, C.e); // lit windows
  for (const lx of [W*0.22, W*0.7]) { fillRect(lx, H*0.62, 4, 26, C.u); fillRect(lx - 6, H*0.58, 14, 12, C.e); } // gas lamps
  fillRect(0, H*0.66, W, H*0.34, C.a);                        // road
  for (let x = -(t*6) % 120; x < W; x += 120) fillRect(x, H*0.82, 16, 6, C.k); // cobbles
}
function drawDeliriumField(t, reachFrac, overFrac) {
  fillRect(0, 0, W, H, C.I);                       // pulsing blood-red base
  const cx = W/2, cy = H*0.42;
  ctx.strokeStyle = 'rgba(255,90,90,0.10)'; ctx.lineWidth = 2;   // concentric warp rings
  for (let i = 1; i <= 6; i++) { ctx.beginPath(); ctx.arc(cx, cy, i*34, 0, Math.PI*2); ctx.stroke(); }
  for (let i = 0; i < 40; i++) fillRect((i*53 + t*3) % W, (i*71) % H, 3, 3, C.r);   // drifting motes
  const press = overFrac * 30;                     // looming gossip-faces, pressing in as overtaken rises
  ctx.fillStyle = 'rgba(225,210,220,0.28)';
  ctx.beginPath(); ctx.ellipse(40 + press, H*0.6, 34, 42, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(W - 40 - press, H*0.62, 38, 46, 0, 0, Math.PI*2); ctx.fill();
  const vg = ctx.createRadialGradient(cx, H/2, H*0.3, cx, H/2, H*0.75);   // vignette
  vg.addColorStop(0, 'rgba(0,0,0,0)'); vg.addColorStop(1, 'rgba(0,0,0,0.55)');
  ctx.fillStyle = vg; ctx.fillRect(0, 0, W, H);
}
function drawChase() {
  if (chase.phase === 1) {
    drawNightStreet(chase.t);
    const sh = (chase.t < (chase.shakeUntil || 0)) ? (Math.random()*6 - 3) : 0;
    // Delvile ahead on a fixed mid-road lane; x derived from the gap
    const dx = Math.min(W - 140, W - 140 - Math.max(0, chase.gap));
    drawCarriageRig(dx + sh, H*0.55, chase.t, 'delvile', -1);
    // Cecilia (player) steers vertically via chase.laneY
    drawCarriageRig(40 + sh, chase.laneY, chase.t, 'cecilia', 1);
    for (const o of chase.obstacles) drawSprite(SP.scandal, o.x, o.y, 3);
    drawText('CHASE HIS CARRIAGE  ↑↓ STEER', W/2, 30, C.w, 1, 'center');
    fillRect(W - 260, 60, 230, 18, C.k);
    fillRect(W - 258, 62, 226 * (1 - Math.min(1, Math.max(0, chase.gap) / 320)), 14, C.v);
    drawText('CLOSING', W - 255, 62, C.w, 1, 'left', false);
  } else {
    const reachFrac = Math.min(1, chase.reach / 100);
    const overFrac  = Math.min(1, chase.overtaken / 100);
    drawDeliriumField(chase.t, reachFrac, overFrac);
    const shake = Math.sin(chase.t * 0.5) * 4;
    // Mortimer ahead: sharpens (alpha) and drifts toward centre as reach rises; dissolves with overtaken
    const dAlpha = Math.max(0, reachFrac - overFrac*0.6);
    const dmx = W*0.7 - reachFrac * W*0.18;
    ctx.save(); ctx.globalAlpha = 0.25 + 0.6*dAlpha;
    drawSprite(SP.delvile, dmx, H*0.42, 3, C, true);
    ctx.restore();
    // Cecilia running (her portrait), vertical bob + motion trail
    const cyB = H*0.42 + Math.sin(chase.t * 0.3) * 6;
    ctx.save(); ctx.globalAlpha = 0.25; drawSprite(SP.cecilia, W*0.34 - 20 + shake, cyB, 4, C, false); ctx.restore();
    ctx.save(); ctx.globalAlpha = 0.5;  drawSprite(SP.cecilia, W*0.34 - 8 + shake,  cyB, 4, C, false); ctx.restore();
    drawSprite(SP.cecilia, W*0.34 + shake, cyB, 4, C, true);
    drawText('REACH HIM!  →/SPACE', W/2, 30, C.w, 2, 'center');
    // meters: REACH gold, OVERTAKEN dark-red
    fillRect(80, 120, 300, 22, C.k); fillRect(82, 122, 296 * reachFrac, 18, C.g);
    drawText('REACH DELVILE', 90, 124, C.w, 1, 'left', false);
    fillRect(80, 150, 300, 22, C.k); fillRect(82, 152, 296 * overFrac, 18, C.F);
    drawText('OVERTAKEN', 90, 154, C.w, 1, 'left', false);
  }
}

// === UPDATE ===
function update() {
  frame++;
  if (state === 'title') {
    if (keyPressed('Space') || keyPressed('Enter')) {
      playSound('select');
      state = 'scene';
      currentSceneIdx = 1;
      setupScene();
    }
  } else if (state === 'scene') {
    if (textIdx < fullText.length) {
      textTimer++;
      if (textTimer % 1 === 0) {
        textIdx++;
        displayText = fullText.substring(0, textIdx);
        if (textIdx % 3 === 0) playSound('type');
      }
    } else {
      const vis = visibleChoices(currentScene, gameState());
      if (vis && vis.length) {
        if (keyPressed('ArrowUp')) { choiceIdx = (choiceIdx - 1 + vis.length) % vis.length; playSound('select'); }
        if (keyPressed('ArrowDown')) { choiceIdx = (choiceIdx + 1) % vis.length; playSound('select'); }
        if (keyPressed('Space') || keyPressed('Enter')) {
          const choice = vis[choiceIdx];
          if (choice.effect) choice.effect(gameState());
          playSound('select');
          if (currentScene.onContinue) currentScene.onContinue();
          else { currentSceneIdx++; setupScene(); }
        }
      } else {
        if (keyPressed('Space') || keyPressed('Enter')) {
          if (currentScene.onContinue) currentScene.onContinue();
          else { currentSceneIdx++; setupScene(); }
        }
      }
    }
  } else if (state === 'minigame') {
    updateMinigame();
    if (mg.finished) {
      if (keyPressed('Space') || keyPressed('Enter')) {
        state = 'scene';
        currentSceneIdx = mgReturnIdx;
        setupScene();
      }
    }
  } else if (state === 'chase') {
    updateChase();
    if (chase.finished && (keyPressed('Space') || keyPressed('Enter'))) {
      if (chase.outcome === 'death') chooseEnding('death');
      else { state = 'scene'; currentSceneIdx = chaseReturnIdx; setupScene(); }
    }
  } else if (state === 'ending') {
    if (textIdx < fullText.length) {
      textTimer++;
      if (textTimer % 1 === 0) {
        textIdx++;
        displayText = fullText.substring(0, textIdx);
        if (textIdx % 3 === 0) playSound('type');
      }
    } else {
      if (keyPressed('Space') || keyPressed('Enter')) {
        resetGame();
        state = 'title';
      }
    }
  }
}

// === DRAW ===
function draw() {
  fillRect(0, 0, W, H, C.k);
  if (state === 'title') {
    drawBackground('title');
    drawTitle();
  } else if (state === 'scene') {
    drawBackground(currentScene.bg);
    if (currentScene.character) drawCharacter(currentScene.character);
    drawHUD();
    drawDialogue(currentScene);
    if (currentScene.choices) drawChoices(visibleChoices(currentScene, gameState()));
  } else if (state === 'minigame') {
    drawMinigame();
    if (mg.finished) {
      ctx.fillStyle = 'rgba(0,0,0,0.75)';
      ctx.fillRect(0, 0, W, H);
      drawText('YOU REACH HOME', W/2, 220, C.g, 3, 'center');
      drawText('Press SPACE to continue', W/2, 320, C.w, 2, 'center');
    }
  } else if (state === 'chase') {
    drawChase();
    if (chase.finished) {
      ctx.fillStyle = 'rgba(0,0,0,0.75)'; ctx.fillRect(0, 0, W, H);
      drawText(chase.caught ? 'YOU REACH HIM' : 'DECLARED MAD', W/2, 230, chase.caught ? C.g : C.F, 3, 'center');
      drawText('Press SPACE', W/2, 320, C.w, 2, 'center');
    }
  } else if (state === 'ending') {
    drawBackground(currentScene.bg);
    drawHUD();
    // Title of ending
    if (currentScene.title) {
      fillRect(0, 60, W, 60, C.k);
      drawText(currentScene.title, W/2, 75, C.g, 3, 'center');
    }
    // Dialogue box for ending text
    const boxH = 280;
    const boxY = H - boxH - 20;
    fillRect(0, boxY, W, boxH, C.k);
    fillRect(0, boxY, W, 4, C.w);
    fillRect(0, boxY + boxH - 4, W, 4, C.w);
    fillRect(0, boxY, 4, boxH, C.w);
    fillRect(W - 4, boxY, 4, boxH, C.w);
    const lines = wrapText(displayText, 44);
    const lineH = 30;
    const maxLines = Math.floor((boxH - 36) / lineH);
    const startLine = Math.max(0, lines.length - maxLines);
    for (let i = startLine; i < lines.length; i++) {
      drawText(lines[i], 30, boxY + 22 + (i - startLine) * lineH, C.w, 2, 'left', false);
    }
    if (textIdx >= fullText.length) {
      if (Math.floor(frame / 30) % 2 === 0) {
        drawText('PRESS SPACE TO RESTART', W/2, H - 30, C.g, 2, 'center');
      }
    }
  }
  // CRT scanline overlay
  ctx.fillStyle = 'rgba(0,0,0,0.1)';
  for (let y = 0; y < H; y += 4) {
    ctx.fillRect(0, y, W, 2);
  }
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}
// === TEST SEAM: pure logic + a live-state view for browser-driven tests ===
// Verified by Playwright pure-logic suite (see cecilia-implementation-plan.md Task 3).
window.Cecilia = {
  blankGS, applyGift, shouldBreakDown, resolveWish, resolveBreakpoint, resolveChase, chaseDifficulty,
  resolveSceneText, visibleChoices, gameState, SCENES, clampVirtue, clampHearts,
  giveTo(kind) { return applyGift(gameState(), kind); },
  chaseResultEnding,
  endingKeys: Object.keys(ENDINGS),
  get live() { return { stats, suitors, flags, state, currentSceneIdx }; }
};
gameLoop();
