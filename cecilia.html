    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: 'Press Start 2P', monospace;
    color: #d4af37;
    padding: 20px;
    gap: 15px;

  #title-bar {
    font-size: 12px;
    letter-spacing: 6px;
    text-shadow: 3px 3px 0 #000, 0 0 10px #d4af37;
  }
  #tv-frame {
    background: linear-gradient(180deg, #5a4030 0%, #3a2010 50%, #2a1505 100%);
    padding: 35px 30px;
    border-radius: 80px 80px 20px 20px;

      0 0 80px rgba(212, 175, 55, 0.2),

    position: relative;
  }
  #tv-frame::after {
    content: '';
    position: absolute;
    bottom: 12px; left: 50%; transform: translateX(-50%);
    width: 40px; height: 10px;
    background: #1a0f08; border-radius: 5px;
  }
  #screen {
    background: #000;
    border: 8px solid #0a0506;
    border-radius: 30px;
    overflow: hidden;
    box-shadow: inset 0 0 50px rgba(0,0,0,0.5), 0 0 0 2px #d4af37;
    line-height: 0;
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    image-rendering: crisp-edges;
    width: 800px;   /* overridden by resizeGame() */
    height: 600px;
  }
  #controls {
    font-size: 9px;
    letter-spacing: 2px;
    text-align: center;
    line-height: 1.6;
  }
  .key {
    color: #ff6b6b;
    background: rgba(0,0,0,0.5);
    padding: 4px 8px;
    border: 1px solid #d4af37;
    border-radius: 3px;
  }

  canvas.style.width = Math.round(800 * scale) + 'px';
  canvas.style.height = Math.round(600 * scale) + 'px';
}

// === DRAWING FUNCTIONS ===
function drawSprite(sprite, x, y, scale, colorMap = C) {
  const maxWidth = Math.max(...sprite.map(r => r.length));
  for (let row = 0; row < sprite.length; row++) {
    const line = sprite[row].padEnd(maxWidth, '.');
    for (let col = 0; col < line.length; col++) {
      const ch = line[col];
      if (ch === '.' || ch === ' ') continue;
      const color = colorMap[ch];
      if (color) {
        ctx.fillStyle = color;
        ctx.fillRect(Math.floor(x + col * scale), Math.floor(y + row * scale), scale, scale);
      }
    }
  }
}
function fillRect(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.floor(x), Math.floor(y), Math.floor(w), Math.floor(h));
}
function drawText(text, x, y, color, size = 2, align = 'left', shadow = true) {
  ctx.font = `${size * 8}px "Press Start 2P", monospace`;
  ctx.textAlign = align;
  ctx.textBaseline = 'top';
  if (shadow) {
    ctx.fillStyle = '#000';
    ctx.fillText(text, Math.floor(x) + size, Math.floor(y) + size);
  }
  ctx.fillStyle = color;
  ctx.fillText(text, Math.floor(x), Math.floor(y));
}
function wrapText(text, maxChars) {
  const paragraphs = text.split('\n');
  const lines = [];
  for (const para of paragraphs) {
    if (para === '') { lines.push(''); continue; }
    const words = para.split(' ');
    let current = '';
    for (const word of words) {
      const test = current ? current + ' ' + word : word;
      if (test.length > maxChars) {
        if (current) lines.push(current);
        current = word;
      } else {
        current = test;
      }
    }
    if (current) lines.push(current);
  }
  return lines;
}

    flags:   { mrsDelvileApproval: false, agreedSecretMarriage: false, kindToArnott: false,

  };
}
// Charity gift: worthy lifts virtue at small cost; vice/Harrel costs more and corrodes virtue.
function applyGift(gs, kind, cost) {
  // Costs are in real pounds: a worthy cause needs only a small alms (£25);
  // a spendthrift demands a ruinous sum (£1000+). `cost` lets the minigame pass each target's amount.
  if (kind === 'worthy')   { gs.stats.gold = Math.max(0, gs.stats.gold - (cost == null ? 25 : cost)); gs.stats.virtue += 1; }
  else if (kind === 'unworthy') { gs.stats.gold = Math.max(0, gs.stats.gold - (cost == null ? 1500 : cost)); gs.stats.virtue = Math.max(0, gs.stats.virtue - 1); }
  return gs;
}
// Breaking point: lost virtue, lost love, OR squandered fortune all push toward the crisis chase.
function shouldBreakDown(gs) {
  return gs.stats.virtue <= 2 || gs.stats.hearts === 0 || gs.stats.gold <= 3000;
}
// Stage 2 wish menu -> ending key.
function resolveWish(wish, gs) {
  const s = gs.stats, su = gs.suitors, f = gs.flags;
  switch (wish) {
    case 'delvile':
      return (f.mrsDelvileApproval && (su.delvile >= 4 || f.agreedSecretMarriage)) ? 'true_love' : 'name_condition';
    case 'independence':
      // Gold is in real pounds (fortune starts at £10,000). Independence = keeping the bulk of it:
      // £9000+ tolerates modest alms to the worthy (£25 each) but not a Harrel bailout or spendthrift indulgence.
      return (s.gold >= 9000 && s.virtue >= 4) ? 'independence' : 'faded';
    case 'arnott':
      return (su.arnott >= 2 || f.kindToArnott) ? 'fortune_married' : 'quiet_spinster';
    case 'monckton':
      return 'ruin';
    default:
      return 'faded';
  }
}
// Stage 1 chase outcome -> ending key. `caught` = reached Delvile in the chase.
function resolveBreakpoint(caught, gs) {
  if (caught) return 'survival';
  const su = gs.suitors, f = gs.flags;
  const redeemable = (su.delvile >= 4 || f.agreedSecretMarriage) && f.mrsDelvileApproval;
  return redeemable ? 'survival' : 'death';
}
// Chase catchability: higher = easier to catch Delvile. Range roughly [0.5, ~3].
function chaseDifficulty(gs) {
  const su = gs.suitors, f = gs.flags, s = gs.stats;
  let c = 0.8;
  c += su.delvile * 0.25;
  if (f.agreedSecretMarriage) c += 0.4;
  if (f.mrsDelvileApproval) c += 0.3;
  c += Math.min(s.virtue, 6) * 0.05;
  c += Math.min(s.gold, 12000) * 0.00003;
  return Math.max(0.5, c);
}
// Resolve a scene's text whether it's a string or a function of game state.

  return (typeof scene.text === 'function') ? scene.text(gs) : (scene.text || '');

  if (!scene.choices) return null;
  return scene.choices.filter(ch => !ch.condition || ch.condition(gs));
}

function chooseEnding(type) {
  currentEndingType = type;
  state = 'ending';
  currentScene = { ...ENDINGS[type] };
  fullText = currentScene.text;
  textIdx = 0;
  displayText = '';
  playSound('victory');
}
function setupScene() {
  if (state === 'ending') return;
  // Skip any scene whose condition(gs) is false.
  while (currentSceneIdx < SCENES.length) {
    const sc = SCENES[currentSceneIdx];
    if (sc.condition && !sc.condition(gameState())) { currentSceneIdx++; continue; }
    break;
  }
  if (currentSceneIdx >= SCENES.length) return;
  currentScene = SCENES[currentSceneIdx];
  if (currentScene.type === 'title') return;
  fullText = resolveSceneText(currentScene, gameState());
  textIdx = 0;
  displayText = '';
  choiceIdx = 0;
}

  stats = { hearts: 0, gold: 10000, virtue: 3 };

}

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function tone(freq, dur, type = 'square', vol = 0.08) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + dur);
}
function playSound(type) {
  switch (type) {
    case 'select': tone(440, 0.08, 'square', 0.06); setTimeout(()=>tone(660,0.05,'square',0.06),60); break;
    case 'coin':
      tone(988, 0.05, 'square', 0.06);
      setTimeout(() => tone(1319, 0.15, 'square', 0.06), 50);
      break;
    case 'jump':
      tone(220, 0.1, 'square', 0.06);
      setTimeout(() => tone(660, 0.05, 'square', 0.06), 50);
      break;
    case 'hurt':
      tone(440, 0.05, 'sawtooth', 0.1);
      setTimeout(() => tone(220, 0.2, 'sawtooth', 0.1), 50);
      break;
    case 'victory':
      [523, 659, 784, 1047, 1319].forEach((f, i) => setTimeout(() => tone(f, 0.2, 'square', 0.08), i * 100));
      break;
    case 'type':
      tone(800 + Math.random() * 200, 0.02, 'square', 0.025);
      break;
  }
}

// === BAROQUE BACKGROUND MUSIC (original, in the style of Handel's Giulio Cesare) ===
let musicOn = true;
const NF = { // note frequencies (Hz)
  D3:146.83, E3:164.81, Fs3:185.00, G3:196.00, A3:220.00, B3:246.94,
  D4:293.66, E4:329.63, Fs4:369.99, G4:392.00, A4:440.00, B4:493.88, Cs5:554.37,
  D5:587.33, E5:659.25
};
const MSPB = 60 / 100; // 100 BPM, stately
// Melody: a D-major aria with Baroque dotted figures and a cadential turn.
const MELODY = [
  ['D4',1],['E4',1],['Fs4',1],['G4',1],
  ['A4',1.5],['G4',0.5],['Fs4',1],['E4',1],
  ['Fs4',1],['A4',1],['D5',1],['Cs5',1],
  ['B4',2],['A4',2],
  ['B4',1],['A4',1],['G4',1],['Fs4',1],
  ['A4',1],['G4',1],['Fs4',1],['E4',1],
  ['G4',1],['Fs4',1],['E4',1],['A4',1],
  ['Fs4',1],['E4',1],['D4',2]
];
// Basso continuo: half-note roots/fifths supporting the harmony.
const BASS = [
  ['D3',2],['A3',2], ['A3',2],['E3',2], ['B3',2],['Fs3',2], ['A3',2],['E3',2],
  ['G3',2],['D3',2], ['Fs3',2],['D3',2], ['G3',2],['A3',2], ['A3',2],['D3',2]
];
function buildTrack(seq){ let t=0; const ev=[]; for(const [n,d] of seq){ ev.push({f:NF[n], t, d:d*MSPB}); t+=d*MSPB; } return {ev, len:t}; }
const M_TRACK = buildTrack(MELODY), B_TRACK = buildTrack(BASS);
const M_LOOP = Math.max(M_TRACK.len, B_TRACK.len);
function musicNote(freq, start, dur, type, vol){
  if(!audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(0.0001, start);
  g.gain.exponentialRampToValueAtTime(vol, start + 0.012);   // quick harpsichord-like pluck
  g.gain.exponentialRampToValueAtTime(0.0001, start + dur * 0.95);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(start); o.stop(start + dur + 0.02);
}
let mBar = 0, mIdx = 0, bIdx = 0;
function scheduleMusic(){
  if(!audioCtx || audioCtx.state !== 'running' || !musicOn) return;
  const ahead = audioCtx.currentTime + 0.3;
  if(mBar === 0) mBar = audioCtx.currentTime + 0.15;
  while(mIdx < M_TRACK.ev.length && mBar + M_TRACK.ev[mIdx].t < ahead){
    const e = M_TRACK.ev[mIdx]; musicNote(e.f, mBar + e.t, e.d, 'triangle', 0.05); mIdx++;
  }
  while(bIdx < B_TRACK.ev.length && mBar + B_TRACK.ev[bIdx].t < ahead){
    const e = B_TRACK.ev[bIdx]; musicNote(e.f, mBar + e.t, e.d, 'square', 0.03); bIdx++;
  }
  if(mIdx >= M_TRACK.ev.length && bIdx >= B_TRACK.ev.length){ mBar += M_LOOP; mIdx = 0; bIdx = 0; }
}
setInterval(scheduleMusic, 60);

// === MINIGAME ===
function initMinigame() {
  mg = {
    player: { x: 50, y: 380, vx: 0, vy: 0, onGround: true, jumpCount: 0 },
    targets: [],
    endX: 5000,
    finished: false,
    result: '',
    levelTime: 0,
    scrollX: 0,
    given: 0
  };
  // Each figure is clearly labelled in drawMinigame. Worthy causes need only a small alms (£25);
  // spendthrifts demand ruinous sums (£1000-£2500) and corrode virtue.
  const worthy = ['family', 'hills', 'beggar', 'hospital'];
  const unworthy = ['harrel', 'gaming', 'fop'];
  let wi = 0, ui = 0;
  for (let x = 650; x < 4800; x += 320 + Math.random() * 120) {
    const vice = Math.random() < 0.5;
    if (vice) {
      mg.targets.push({ x, y: 360, w: 56, h: 60, kind: 'unworthy', who: unworthy[ui++ % unworthy.length], cost: 1000 + Math.round(Math.random() * 3) * 500, given: false });
    } else {
      mg.targets.push({ x, y: 380, w: 44, h: 44, kind: 'worthy', who: worthy[wi++ % worthy.length], cost: 25, given: false });
    }
  }
}
const TARGET_NAME = { family: 'POOR FAMILY', hills: 'THE HILLS', beggar: 'A BEGGAR', hospital: 'HOSPITAL', harrel: 'MR. HARREL', gaming: 'GAMING DEN', fop: 'A FOP' };
function updateMinigame() {
  if (mg.finished) return;
  mg.levelTime++;
  // Movement
  if (keys['ArrowRight'] || keys['KeyD']) {
    mg.player.vx = Math.min(mg.player.vx + 0.6, 4.5);
  } else if (keys['ArrowLeft'] || keys['KeyA']) {
    mg.player.vx = Math.max(mg.player.vx - 0.6, -3);
  } else {
    mg.player.vx *= 0.75;
  }
  // Jump (with double jump)
  if (keyPressed('Space') || keyPressed('ArrowUp') || keyPressed('KeyW')) {
    if (mg.player.onGround) {
      mg.player.vy = -12;
      mg.player.onGround = false;
      mg.player.jumpCount = 1;
      playSound('jump');
    } else if (mg.player.jumpCount < 2) {
      mg.player.vy = -10;
      mg.player.jumpCount++;
      playSound('jump');
    }
  }
  // Gravity
  mg.player.vy += 0.6;
  if (mg.player.vy > 15) mg.player.vy = 15;
  mg.player.x += mg.player.vx;
  mg.player.y += mg.player.vy;
  // Ground
  if (mg.player.y > 380) {
    mg.player.y = 380;
    mg.player.vy = 0;
    mg.player.onGround = true;
    mg.player.jumpCount = 0;
  }
  // Bounds
  if (mg.player.x < 50) { mg.player.x = 50; mg.player.vx = 0; }
  // GIVE: Down / S, when near an ungiven target and she still has coin
  if (keyPressed('ArrowDown') || keyPressed('KeyS')) {
    for (const t of mg.targets) {
      if (t.given) continue;
      if (Math.abs((mg.player.x + 12) - (t.x + t.w / 2)) < 50 && stats.gold > 0) {
        t.given = true;
        applyGift(gameState(), t.kind, t.cost);   // mutates live stats by this target's cost
        mg.given++;
        playSound(t.kind === 'worthy' ? 'coin' : 'hurt');
        break;
      }
    }
  }
  // Finish
  if (mg.player.x > mg.endX) {
    mg.player.x = mg.endX;
    mg.finished = true;
    mg.result = 'done';
    playSound('victory');
  }
  mg.scrollX = mg.player.x - 200;
}

// A Georgian 6-over-6 sash window: stone surround, white frame, pale glass, glazing bars.
function drawSashWindow(x, y, w, h) {

  fillRect(x, y, w, h, C.w);                    // white sash frame
  fillRect(x + 2, y + 2, w - 4, h - 4, C.l);    // pale glass
  fillRect(x + w / 2 - 1, y + 2, 2, h - 4, C.w);          // central glazing bar
  fillRect(x + 2, y + Math.round(h / 3) - 1, w - 4, 2, C.w);
  fillRect(x + 2, y + Math.round(2 * h / 3) - 1, w - 4, 2, C.w);
}

      }
      fillRect(0, H - 100, W, 100, C.v);
      for (let i = 0; i < 30; i++) {
        const fx = (i * 47) % W;
        const fy = H - 90 + (i * 17) % 20;
        const colors = [C.F, C.p, C.m, C.y];
        fillRect(fx, fy, 6, 6, colors[i % 4]);
      }
      break;
    }
  }
}

function fmtGold(g) { return '£' + Math.round(g).toLocaleString('en-GB'); }
function drawHUD() {
  fillRect(0, 0, W, 50, C.k);
  fillRect(0, 50, W, 4, C.w);
  drawText('LOVE', 20, 18, C.w, 1, 'left', false);
  for (let i = 0; i < 5; i++) {
    if (i < stats.hearts) drawSprite(SP.heart, 100 + i * 25, 8, 1);
    else fillRect(100 + i * 25, 8, 18, 18, C.u);
  }
  drawText('GOLD', 250, 18, C.g, 1, 'left', false);
  drawText(fmtGold(stats.gold), 320, 18, C.g, 1, 'left', false);
  drawText('VIRTUE', 470, 18, C.h, 1, 'left', false);
  for (let i = 0; i < 6; i++) {
    fillRect(560 + i * 16, 10, 12, 20, i < stats.virtue ? C.v : C.u);
  }
}

function drawDialogue(scene) {
  if (!scene || (!scene.speaker && !scene.text)) return;
  const boxTop = 322, boxH = H - boxTop;   // taller box: 322..600
  const boxY = boxTop;
  fillRect(0, boxY, W, boxH, C.k);
  fillRect(0, boxY, W, 4, C.w);
  fillRect(0, boxY + boxH - 4, W, 4, C.w);
  fillRect(0, boxY, 4, boxH, C.w);
  fillRect(W - 4, boxY, 4, boxH, C.w);
  if (scene.speaker) {
    fillRect(20, boxY - 34, 360, 40, C.w);
    fillRect(25, boxY - 29, 350, 30, C.k);
    drawText(scene.speaker, 34, boxY - 22, C.g, 1.5, 'left', false);
  }
  const SIZE = 2, lineH = 30, maxChars = 44, padX = 30;
  const hasChoices = !!(scene.choices && visibleChoices(scene, gameState()).length);
  const lines = wrapText(displayText, maxChars);
  if (hasChoices) {
    // spoken line pinned to the top; choices go beneath it (never overlapping)
    const textTop = boxY + 22;
    for (let i = 0; i < lines.length; i++) {
      drawText(lines[i], padX, textTop + i * lineH, C.w, SIZE, 'left', false);
    }
    const fullLines = wrapText(fullText, maxChars).length;   // stable position even mid-typing
    choiceStartY = textTop + fullLines * lineH + 16;
  } else {
    // narration: vertically center the block so the box isn't half-empty
    const blockH = lines.length * lineH;
    const textTop = boxY + Math.max(22, (boxH - blockH) / 2 - 8);
    for (let i = 0; i < lines.length; i++) {
      drawText(lines[i], padX, textTop + i * lineH, C.w, SIZE, 'left', false);
    }
    if (textIdx >= fullText.length && Math.floor(frame / 30) % 2 === 0) {
      drawText('PRESS SPACE', W - 230, boxY + boxH - 36, C.g, 1.5, 'left', false);
    }
  }
}

function drawCharacter(charName) {
  if (!charName || !SP[charName]) return;
  const sprite = SP[charName];
  const maxW = Math.max(...sprite.map(r => r.length));
  const x = (W - maxW * 4) / 2;
  // Slight idle animation (raised so it clears the taller dialogue box + speaker label)
  const y = 198 + Math.sin(frame * 0.05) * 1;
  drawSprite(sprite, x, y, 4);
}

function drawTitle() {
  const y = 80 + Math.sin(frame * 0.04) * 5;
  drawText('CECILIA', W/2, y, C.g, 6, 'center');
  drawText('A MARRIAGE QUEST', W/2, 170, C.w, 3, 'center');
  drawText('After the novel by Frances Burney', W/2, 215, C.c, 1, 'center');
  const ceciliaY = 270 + Math.sin(frame * 0.06) * 4;
  drawSprite(SP.cecilia, W/2 - 32, ceciliaY, 4);
  for (let i = 0; i < 3; i++) {
    const angle = frame * 0.03 + (i * 2 * Math.PI / 3);
    const hx = W/2 + Math.cos(angle) * 80;
    const hy = 350 + Math.sin(angle) * 20;
    drawSprite(SP.heart, Math.floor(hx), Math.floor(hy), 1);
  }
  if (Math.floor(frame / 30) % 2 === 0) {
    drawText('PRESS SPACE TO START', W/2, 460, C.y, 2, 'center');
  }
  drawText('A retro adventure in 8-bit', W/2, 540, C.c, 1, 'center');
}

function drawChoices(choices) {
  if (!choices || textIdx < fullText.length) return;
  const startY = choiceStartY || 430;
  const pitch = 40, bx = 50, bw = 700, bh = 34;
  for (let i = 0; i < choices.length; i++) {
    const cy = startY + i * pitch;
    const selected = i === choiceIdx;
    fillRect(bx, cy, bw, bh, selected ? C.n : C.k);
    fillRect(bx + 4, cy + 4, bw - 8, bh - 8, selected ? C.B : C.u);
    if (selected) drawText('►', bx + 14, cy + 11, C.y, 1.5, 'left', false);
    drawText(choices[i].text, bx + 44, cy + 11, selected ? C.w : C.c, 1.5, 'left', false);
  }
}

function drawMinigame() {
  fillRect(0, 0, W, H, C.z);
  // Parallax clouds
  ctx.save();
  ctx.translate(-mg.scrollX * 0.3, 0);
  for (let i = 0; i < 8; i++) {
    drawSprite(SP.cloud, i * 400 + 50, 30 + (i % 3) * 50, 3);
  }
  ctx.restore();
  // Hills
  ctx.save();
  ctx.translate(-mg.scrollX * 0.5, 0);
  for (let i = 0; i < 20; i++) {
    fillRect(i * 200, 350, 150, 50, C.v);
    fillRect(i * 200, 340, 150, 15, C.d);
  }
  ctx.restore();
  // World
  ctx.save();
  ctx.translate(-mg.scrollX, 0);
  fillRect(0, 410, 6000, 190, C.q);
  fillRect(0, 410, 6000, 20, C.v);
  for (let x = 0; x < 6000; x += 60) {
    fillRect(x, 440, 60, 4, C.j);
    fillRect(x + 30, 460, 30, 4, C.j);
  }
  // Targets — each clearly labelled so the player knows who deserves charity
  for (const t of mg.targets) {
    const bob = Math.sin(mg.levelTime * 0.1 + t.x) * 3;
    const name = TARGET_NAME[t.who] || '';
    if (t.kind === 'worthy') {
      // a small, humble figure (brown), with a GREEN "worthy" label
      fillRect(t.x, t.y + bob, 28, 36, t.given ? C.u : C.a);
      fillRect(t.x + 6, t.y + bob - 8, 16, 12, t.given ? C.u : C.s);
      if (!t.given) {
        fillRect(t.x - 14, t.y + bob - 62, 96, 48, C.d);          // green banner
        fillRect(t.x - 14, t.y + bob - 62, 96, 3, C.h);
        drawText('WORTHY', t.x - 8, t.y + bob - 58, C.h, 1, 'left', false);
        drawText(name, t.x - 10, t.y + bob - 44, C.w, 1, 'left', false);
        drawText('GIVE £25', t.x - 10, t.y + bob - 28, C.g, 1, 'left', false);
      } else {
        drawText('✓', t.x + 8, t.y + bob - 22, C.h, 1, 'left', false);
      }
    } else {
      // a gaudy figure (purple/gold), with a RED "spendthrift" warning label
      fillRect(t.x, t.y + bob, 44, 48, t.given ? C.u : C.m);
      fillRect(t.x + 8, t.y + bob - 10, 28, 14, t.given ? C.u : C.x);
      if (!t.given) {
        fillRect(t.x - 16, t.y + bob - 66, 132, 52, C.I);         // red banner
        fillRect(t.x - 16, t.y + bob - 66, 132, 3, C.r);
        drawText('SPENDTHRIFT', t.x - 10, t.y + bob - 62, C.r, 1, 'left', false);
        drawText(name, t.x - 12, t.y + bob - 46, C.w, 1, 'left', false);
        drawText('WANTS £' + t.cost.toLocaleString('en-GB'), t.x - 12, t.y + bob - 30, C.x, 1, 'left', false);
      }
    }
  }
  // Player
  const px = Math.floor(mg.player.x);
  const py = Math.floor(mg.player.y);
  drawSprite(SP.cecilia, px, py + (mg.player.onGround && Math.abs(mg.player.vx) > 0.5 ? Math.sin(mg.levelTime * 0.3) : 0), 3);
  // End marker
  fillRect(mg.endX, 200, 6, 210, C.L);
  fillRect(mg.endX + 6, 210, 60, 40, C.v);
  drawText('HOME', mg.endX + 10, 220, C.w, 1, 'left', false);
  ctx.restore();
  // UI: virtue + gold
  drawText('VIRTUE', 20, 60, C.h, 1, 'left', false);
  for (let i = 0; i < 6; i++) fillRect(90 + i * 18, 55, 14, 18, i < stats.virtue ? C.v : C.u);
  drawText('GOLD', 20, 100, C.g, 1, 'left', false);
  drawText(fmtGold(stats.gold), 90, 100, C.g, 1, 'left', false);
  fillRect(W - 280, 60, 250, 25, C.k);
  fillRect(W - 278, 62, 246, 21, C.u);
  fillRect(W - 278, 62, 246 * Math.min(mg.player.x / mg.endX, 1), 21, C.v);
  drawText('THE STREET', W - 275, 65, C.w, 1, 'left', false);
  // instruction banner: tell the player exactly who to give to
  fillRect(W / 2 - 300, 18, 600, 24, C.k);
  fillRect(W / 2 - 300, 18, 600, 3, C.w);
  drawText('GIVE TO THE WORTHY (GREEN)   -   REFUSE SPENDTHRIFTS (RED)', W / 2, 25, C.w, 1, 'center');
  drawText('←→ WALK   ↓/S GIVE   SPACE JUMP', W / 2, H - 25, C.c, 1, 'center');
}

// === DELIRIUM CHASE ===
let chase = null;
function initChase() {
  const diff = chaseDifficulty(gameState());
  chase = {
    phase: 1,                 // 1 = carriage, 2 = foot
    t: 0,
    laneY: 300,               // Cecilia's carriage vertical position
    gap: 320,                 // distance to Delvile's carriage; smaller = closer
    obstacles: [],
    nextObs: 60,
    reach: 0,                 // phase 2: progress toward Delvile (0..100)
    overtaken: 0,             // phase 2: pursuers closing (0..100)
    diff,                     // catchability factor
    finished: false,
    caught: false,
    endingKey: null
  };
}
function updateChase() {
  if (chase.finished) return;
  chase.t++;
  if (chase.phase === 1) {
    // Steer up/down to dodge; Delvile lingers more when diff is high (he half-wants to be caught).
    if (keys['ArrowUp'] || keys['KeyW']) chase.laneY = Math.max(120, chase.laneY - 4);
    if (keys['ArrowDown'] || keys['KeyS']) chase.laneY = Math.min(440, chase.laneY + 4);
    // Spawn obstacles
    if (--chase.nextObs <= 0) {
      chase.obstacles.push({ x: W + 20, y: 120 + Math.random() * 320, w: 40, h: 40, hit: false });
      chase.nextObs = 50 + Math.random() * 40;
    }
    for (const o of chase.obstacles) {
      o.x -= 6;
      if (!o.hit && o.x < 90 && o.x + o.w > 40 && Math.abs(o.y - chase.laneY) < 40) {
        o.hit = true; chase.gap += 40; playSound('hurt');   // crash widens the gap
      }
    }
    chase.obstacles = chase.obstacles.filter(o => o.x > -50);
    // Clean driving slowly closes the gap; lingering scales with diff.
    chase.gap -= 0.5 * chase.diff;
    if (chase.gap <= 0) { chase.phase = 2; playSound('select'); }     // caught up -> foot chase
    if (chase.t > 60 * 30) { chase.phase = 2; }                       // safety: cap phase 1 at ~30s
  } else {
    // Phase 2: mash Right/Space to reach him before the crowd overtakes her.
    if (keyPressed('ArrowRight') || keyPressed('Space') || keyPressed('KeyD')) chase.reach += 2.2;
    chase.reach += 0.25 * (chase.diff - 0.8);            // love makes him linger within reach
    chase.overtaken += 0.45;                             // pursuers always closing
    chase.reach = Math.max(0, chase.reach);
    if (chase.reach >= 100) { chase.caught = true; chase.finished = true; }
    else if (chase.overtaken >= 100) { chase.caught = false; chase.finished = true; }
    if (chase.finished) {
      chase.endingKey = resolveBreakpoint(chase.caught, gameState());
      playSound(chase.caught ? 'victory' : 'hurt');
    }
  }
}
function chaseResultEnding() { return chase ? chase.endingKey : null; }
function drawChase() {
  if (chase.phase === 1) {
    fillRect(0, 0, W, H, C.n);                       // night streets
    for (let i = 0; i < 6; i++) fillRect((i * 160 - (chase.t * 6) % 160), 80 + (i % 2) * 30, 30, 6, C.u);
    // road
    fillRect(0, 100, W, 380, C.a);
    for (let x = -(chase.t * 6) % 120; x < W; x += 120) fillRect(x, 280, 60, 8, C.e);
    // Delvile's carriage ahead (position from gap)
    const dx = Math.min(W - 80, W - 80 - Math.max(0, chase.gap));
    fillRect(dx, 250, 70, 50, C.L); fillRect(dx + 10, 235, 40, 20, C.t);
    // Cecilia's carriage
    fillRect(50, chase.laneY, 70, 50, C.m); fillRect(60, chase.laneY - 14, 40, 18, C.p);
    for (const o of chase.obstacles) drawSprite(SP.scandal, o.x, o.y, 3);
    drawText('CHASE HIS CARRIAGE  ↑↓ STEER', W/2, 30, C.w, 1, 'center');
    // gap meter
    fillRect(W - 260, 60, 230, 18, C.k);
    fillRect(W - 258, 62, 226 * (1 - Math.min(1, Math.max(0, chase.gap) / 320)), 14, C.v);
    drawText('CLOSING', W - 255, 62, C.w, 1, 'left', false);
  } else {
    // Foot chase: distorted, tinted delirium
    fillRect(0, 0, W, H, C.I);
    const shake = Math.sin(chase.t * 0.5) * 4;
    for (let i = 0; i < 40; i++) fillRect((i * 53 + chase.t * 3) % W, (i * 71) % H, 3, 3, C.r);
    drawSprite(SP.cecilia, W/2 - 30 + shake, 300 + Math.sin(chase.t * 0.3) * 6, 4);
    drawText('REACH HIM!  →/SPACE', W/2, 30, C.w, 2, 'center');
    // reach meter (good) and overtaken meter (bad)
    fillRect(80, 120, 300, 22, C.k); fillRect(82, 122, 296 * (chase.reach / 100), 18, C.v);
    drawText('REACH DELVILE', 90, 124, C.w, 1, 'left', false);
    fillRect(80, 150, 300, 22, C.k); fillRect(82, 152, 296 * (chase.overtaken / 100), 18, C.F);
    drawText('OVERTAKEN', 90, 154, C.w, 1, 'left', false);
  }
}

// === UPDATE ===
function update() {
  frame++;
  if (state === 'title') {
    if (keyPressed('Space') || keyPressed('Enter')) {
      playSound('select');
      state = 'scene';
      currentSceneIdx = 1;
      setupScene();
    }
  } else if (state === 'scene') {
    if (textIdx < fullText.length) {
      textTimer++;
      if (textTimer % 1 === 0) {
        textIdx++;
        displayText = fullText.substring(0, textIdx);
        if (textIdx % 3 === 0) playSound('type');
      }
    } else {
      const vis = visibleChoices(currentScene, gameState());
      if (vis && vis.length) {
        if (keyPressed('ArrowUp')) { choiceIdx = (choiceIdx - 1 + vis.length) % vis.length; playSound('select'); }
        if (keyPressed('ArrowDown')) { choiceIdx = (choiceIdx + 1) % vis.length; playSound('select'); }
        if (keyPressed('Space') || keyPressed('Enter')) {
          const choice = vis[choiceIdx];
          if (choice.effect) choice.effect(gameState());
          playSound('select');
          if (currentScene.onContinue) currentScene.onContinue();
          else { currentSceneIdx++; setupScene(); }
        }
      } else {
        if (keyPressed('Space') || keyPressed('Enter')) {
          if (currentScene.onContinue) currentScene.onContinue();
          else { currentSceneIdx++; setupScene(); }
        }
      }
    }
  } else if (state === 'minigame') {
    updateMinigame();
    if (mg.finished) {
      if (keyPressed('Space') || keyPressed('Enter')) {
        state = 'scene';
        currentSceneIdx = mgReturnIdx;
        setupScene();
      }
    }
  } else if (state === 'chase') {
    updateChase();
    if (chase.finished && (keyPressed('Space') || keyPressed('Enter'))) {
      chooseEnding(chase.endingKey);
    }
  } else if (state === 'ending') {
    if (textIdx < fullText.length) {
      textTimer++;
      if (textTimer % 1 === 0) {
        textIdx++;
        displayText = fullText.substring(0, textIdx);
        if (textIdx % 3 === 0) playSound('type');
      }
    } else {
      if (keyPressed('Space') || keyPressed('Enter')) {
        resetGame();
        state = 'title';
      }
    }
  }
}

// === DRAW ===
function draw() {
  fillRect(0, 0, W, H, C.k);
  if (state === 'title') {
    drawBackground('title');
    drawTitle();
  } else if (state === 'scene') {
    drawBackground(currentScene.bg);
    if (currentScene.character) drawCharacter(currentScene.character);
    drawHUD();
    drawDialogue(currentScene);
    if (currentScene.choices) drawChoices(visibleChoices(currentScene, gameState()));
  } else if (state === 'minigame') {
    drawMinigame();
    if (mg.finished) {
      ctx.fillStyle = 'rgba(0,0,0,0.75)';
      ctx.fillRect(0, 0, W, H);
      drawText('YOU REACH HOME', W/2, 220, C.g, 3, 'center');
      drawText('Press SPACE to continue', W/2, 320, C.w, 2, 'center');
    }
  } else if (state === 'chase') {
    drawChase();
    if (chase.finished) {
      ctx.fillStyle = 'rgba(0,0,0,0.75)'; ctx.fillRect(0, 0, W, H);
      drawText(chase.caught ? 'YOU REACH HIM' : 'DECLARED MAD', W/2, 230, chase.caught ? C.g : C.F, 3, 'center');
      drawText('Press SPACE', W/2, 320, C.w, 2, 'center');
    }
  } else if (state === 'ending') {
    drawBackground(currentScene.bg);
    drawHUD();
    // Title of ending
    if (currentScene.title) {
      fillRect(0, 60, W, 60, C.k);
      drawText(currentScene.title, W/2, 75, C.g, 3, 'center');
    }
    // Dialogue box for ending text
    const boxH = 280;
    const boxY = H - boxH - 20;
    fillRect(0, boxY, W, boxH, C.k);
    fillRect(0, boxY, W, 4, C.w);
    fillRect(0, boxY + boxH - 4, W, 4, C.w);
    fillRect(0, boxY, 4, boxH, C.w);
    fillRect(W - 4, boxY, 4, boxH, C.w);
    const lines = wrapText(displayText, 44);
    const lineH = 30;
    const maxLines = Math.floor((boxH - 36) / lineH);
    const startLine = Math.max(0, lines.length - maxLines);
    for (let i = startLine; i < lines.length; i++) {
      drawText(lines[i], 30, boxY + 22 + (i - startLine) * lineH, C.w, 2, 'left', false);
    }
    if (textIdx >= fullText.length) {
      if (Math.floor(frame / 30) % 2 === 0) {
        drawText('PRESS SPACE TO RESTART', W/2, H - 30, C.g, 2, 'center');
      }
    }
  }
  // CRT scanline overlay
  ctx.fillStyle = 'rgba(0,0,0,0.1)';
  for (let y = 0; y < H; y += 4) {
    ctx.fillRect(0, y, W, 2);
  }
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}
// === TEST SEAM: pure logic + a live-state view for browser-driven tests ===
// Verified by Playwright pure-logic suite (see cecilia-implementation-plan.md Task 3).
window.Cecilia = {
  blankGS, applyGift, shouldBreakDown, resolveWish, resolveBreakpoint, chaseDifficulty,
  resolveSceneText, visibleChoices, gameState,
  giveTo(kind) { return applyGift(gameState(), kind); },
  chaseResultEnding,
  endingKeys: Object.keys(ENDINGS),
  get live() { return { stats, suitors, flags, state, currentSceneIdx }; }
};
gameLoop();
