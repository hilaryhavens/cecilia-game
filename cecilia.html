<!DOCTYPE html>

<meta charset="UTF-8">
<title>Cecilia: A Marriage Quest</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    margin: 0;
    background: #0a0506;
    background-image:
      radial-gradient(ellipse at center, #2c1810 0%, #0a0506 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: 'Press Start 2P', monospace;
    color: #d4af37;
    padding: 20px;
    gap: 15px;
  }
  #title-bar {
    font-size: 12px;
    letter-spacing: 6px;
    text-shadow: 3px 3px 0 #000, 0 0 10px #d4af37;
  }
  #tv-frame {
    background: linear-gradient(180deg, #5a4030 0%, #3a2010 50%, #2a1505 100%);
    padding: 35px 30px;
    border-radius: 80px 80px 20px 20px;
    box-shadow:
      inset 0 0 60px rgba(0,0,0,0.8),
      0 0 80px rgba(212, 175, 55, 0.2),
      0 20px 50px rgba(0,0,0,0.9);
    position: relative;
  }
  #tv-frame::after {
    content: '';
    position: absolute;
    bottom: 12px; left: 50%; transform: translateX(-50%);
    width: 40px; height: 10px;
    background: #1a0f08; border-radius: 5px;
  }
  #screen {
    background: #000;
    border: 8px solid #0a0506;
    border-radius: 30px;
    overflow: hidden;
    box-shadow: inset 0 0 50px rgba(0,0,0,0.5), 0 0 0 2px #d4af37;
    line-height: 0;
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    image-rendering: crisp-edges;
    width: 800px;   /* overridden by resizeGame() */
    height: 600px;
  }
  #controls {
    font-size: 9px;
    letter-spacing: 2px;
    text-align: center;
    line-height: 1.6;
  }
  .key {
    color: #ff6b6b;
    background: rgba(0,0,0,0.5);
    padding: 4px 8px;
    border: 1px solid #d4af37;
    border-radius: 3px;
  }
</style>
</head>
<body>
  <div id="title-bar">★ FRANCES BURNEY PRESENTS ★</div>
  <div id="tv-frame">
    <div id="screen">
      <canvas id="game" width="800" height="600"></canvas>
    </div>
  </div>
  <div id="controls">
    <span class="key">SPACE/ENTER</span> SELECT |
    <span class="key">↑↓</span> CHOOSE/STEER |
    <span class="key">←→</span> MOVE |
    <span class="key">↓</span> GIVE |
    <span class="key">SPACE</span> JUMP |
    <span class="key">M</span> MUSIC

// === RESPONSIVE: scale internal 800x600 to fit the window (preserve aspect) ===
function resizeGame() {
  // leave ~12% vertical room for the title bar + controls + TV frame padding
  const availW = window.innerWidth * 0.96;
  const availH = window.innerHeight * 0.86;
  const scale = Math.max(0.25, Math.min(availW / 800, availH / 600));
  canvas.style.width = Math.round(800 * scale) + 'px';
  canvas.style.height = Math.round(600 * scale) + 'px';
}

resizeGame();

// === DRAWING FUNCTIONS ===
function drawSprite(sprite, x, y, scale, colorMap = C, outline = false) {
  const maxWidth = Math.max(...sprite.map(r => r.length));
  const isFilled = (r, c) => {
    if (r < 0 || r >= sprite.length || c < 0) return false;
    const ch = (sprite[r] || '')[c];
    return ch && ch !== '.' && ch !== ' ' && colorMap[ch];
  };
  // Pass 1: bold Super-Mario-style outline around the silhouette (8-neighbourhood)
  if (outline) {
    const oc = (typeof outline === 'string') ? outline : '#10101c';
    ctx.fillStyle = oc;
    for (let row = 0; row < sprite.length; row++) {
      for (let col = 0; col < maxWidth; col++) {
        if (isFilled(row, col)) continue;
        let near = false;
        for (let dr = -1; dr <= 1 && !near; dr++)
          for (let dc = -1; dc <= 1; dc++)
            if (isFilled(row + dr, col + dc)) { near = true; break; }
        if (near) ctx.fillRect(Math.floor(x + col * scale), Math.floor(y + row * scale), scale, scale);
      }
    }
  }
  // Pass 2: fills
  for (let row = 0; row < sprite.length; row++) {
    const line = sprite[row].padEnd(maxWidth, '.');
    for (let col = 0; col < line.length; col++) {
      const ch = line[col];
      if (ch === '.' || ch === ' ') continue;
      const color = colorMap[ch];
      if (color) {
        ctx.fillStyle = color;
        ctx.fillRect(Math.floor(x + col * scale), Math.floor(y + row * scale), scale, scale);
      }
    }
  }
}
function fillRect(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.floor(x), Math.floor(y), Math.floor(w), Math.floor(h));
}
function drawText(text, x, y, color, size = 2, align = 'left', shadow = true) {
  ctx.font = `${size * 8}px "Press Start 2P", monospace`;
  ctx.textAlign = align;
  ctx.textBaseline = 'top';
  if (shadow) {
    ctx.fillStyle = '#000';
    ctx.fillText(text, Math.floor(x) + size, Math.floor(y) + size);
  }
  ctx.fillStyle = color;
  ctx.fillText(text, Math.floor(x), Math.floor(y));
}
function wrapText(text, maxChars) {
  const paragraphs = text.split('\n');
  const lines = [];
  for (const para of paragraphs) {
    if (para === '') { lines.push(''); continue; }
    const words = para.split(' ');
    let current = '';
    for (const word of words) {
      const test = current ? current + ' ' + word : word;
      if (test.length > maxChars) {
        if (current) lines.push(current);
        current = word;
      } else {
        current = test;
      }
    }
    if (current) lines.push(current);
  }
  return lines;
}

  };

// Charity gift: worthy lifts virtue at small cost; vice/Harrel costs more and corrodes virtue.
function applyGift(gs, kind, cost) {
  if (kind === 'worthy')        { gs.stats.gold = Math.max(0, gs.stats.gold - (cost == null ? 25 : cost)); gs.stats.virtue += 1; }
  else if (kind === 'unworthy') { gs.stats.gold = Math.max(0, gs.stats.gold - (cost == null ? 1500 : cost)); gs.stats.virtue -= 1; }
  clampVirtue(gs);
  return gs;
}
// Virtue is a 0..6 gauge: clamp after any change so the 6 HUD pips stay honest.
function clampVirtue(gs) { gs.stats.virtue = Math.max(0, Math.min(6, gs.stats.virtue)); }
// LOVE is a 0..5 gauge (HUD shows 5 heart slots): clamp after any change.
function clampHearts(gs) { gs.stats.hearts = Math.max(0, Math.min(5, gs.stats.hearts)); }
// Breaking point: lost virtue OR squandered fortune means a failed chase is lethal.
// (hearts no longer gates this — the chase runs for everyone now; see resolveChase)
function shouldBreakDown(gs) {
  return gs.stats.virtue <= 2 || gs.stats.gold <= 3000;
}
// Stage 2 wish menu -> ending key.
function resolveWish(wish, gs) {
  const s = gs.stats, su = gs.suitors, f = gs.flags;
  switch (wish) {
    case 'delvile':
      return (f.mrsDelvileApproval && s.hearts >= 2 && (su.delvile >= 4 || f.agreedSecretMarriage || f.caughtDelvile)) ? 'true_love' : 'name_condition';
    case 'independence':
      // Gold is in real pounds (fortune starts at £10,000). Independence = keeping the bulk of it:
      // £7500+ tolerates modest alms to the worthy (£25 each) and even survives one Harrel bailout
      // (−£3000), but a spendthrift's squandering still forecloses it.
      return (s.gold >= 7500 && s.virtue >= 4) ? 'independence' : 'faded';
    case 'arnott':
      return (su.arnott >= 2 || f.kindToArnott) ? 'fortune_married' : 'quiet_spinster';
    case 'monckton':
      return 'ruin';
    default:
      return 'faded';
  }
}
// Declared-mad resolution -> a FIXED ending (the wish menu is skipped). If Delvile's
// devotion and his mother's blessing can still reach her, he marries her out of her
// delirium ('survival'); otherwise she is committed to an asylum ('asylum').
function resolveBreakpoint(caught, gs) {
  if (caught) return 'survival';
  const su = gs.suitors, f = gs.flags;
  const redeemable = (su.delvile >= 4 || f.agreedSecretMarriage) && f.mrsDelvileApproval;
  return redeemable ? 'survival' : 'asylum';
}
// Chase outcome routing: the chase ALWAYS plays.
//  - Catch Delvile, OR survive the chase without breaking down, and she keeps her wits
//    -> 'wish' (proceed to the wish menu, full agency over her fate).
//  - Break down during the chase = DECLARED MAD: the wish menu is skipped ENTIRELY and the
//    ending is fixed to married-to-Delvile ('survival') or the asylum ('asylum').
function resolveChase(caught, gs) {
  if (caught) return 'wish';
  if (!shouldBreakDown(gs)) return 'wish';
  return resolveBreakpoint(false, gs);   // declared mad -> 'survival' or 'asylum'
}
// Chase catchability: higher = easier to catch Delvile. Range roughly [0.5, ~3].
function chaseDifficulty(gs) {
  const su = gs.suitors, f = gs.flags, s = gs.stats;
  let c = 0.8;
  c += su.delvile * 0.25;
  if (f.agreedSecretMarriage) c += 0.4;
  if (f.mrsDelvileApproval) c += 0.3;
  c += Math.min(s.virtue, 6) * 0.05;
  c += Math.min(s.gold, 12000) * 0.00003;
  c += Math.min(s.hearts, 5) * 0.15;   // love makes her press harder after him
  return Math.max(0.5, c);
}
// Resolve a scene's text whether it's a string or a function of game state.
function resolveSceneText(scene, gs) {
  return (typeof scene.text === 'function') ? scene.text(gs) : (scene.text || '');
}
// Filter a scene's choices by optional condition(gs).
function visibleChoices(scene, gs) {
  if (!scene.choices) return null;
  return scene.choices.filter(ch => !ch.condition || ch.condition(gs));
}
function gameState() { return { stats, suitors, flags }; }

function chooseEnding(type) {
  currentEndingType = type;
  state = 'ending';
  currentScene = { ...ENDINGS[type] };
  fullText = currentScene.text;
  textIdx = 0;
  displayText = '';
  playSound('victory');
}
function setupScene() {
  if (state === 'ending') return;
  for (const k in keys) if (k.endsWith('_p')) keys[k] = false;  // a press from a previous scene/minigame never carries into this one
  // Skip any scene whose condition(gs) is false.
  while (currentSceneIdx < SCENES.length) {
    const sc = SCENES[currentSceneIdx];
    if (sc.condition && !sc.condition(gameState())) { currentSceneIdx++; continue; }
    break;
  }
  if (currentSceneIdx >= SCENES.length) return;
  currentScene = SCENES[currentSceneIdx];
  if (currentScene.type === 'title') return;
  fullText = resolveSceneText(currentScene, gameState());
  textIdx = 0;
  displayText = '';
  choiceIdx = 0;
}

// === SOUND ===
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function tone(freq, dur, type = 'square', vol = 0.08) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + dur);
}
function playSound(type) {
  switch (type) {
    case 'select': tone(440, 0.08, 'square', 0.06); setTimeout(()=>tone(660,0.05,'square',0.06),60); break;
    case 'coin':
      tone(988, 0.05, 'square', 0.06);
      setTimeout(() => tone(1319, 0.15, 'square', 0.06), 50);
      break;
    case 'jump':
      tone(220, 0.1, 'square', 0.06);
      setTimeout(() => tone(660, 0.05, 'square', 0.06), 50);
      break;
    case 'hurt':
      tone(440, 0.05, 'sawtooth', 0.1);
      setTimeout(() => tone(220, 0.2, 'sawtooth', 0.1), 50);
      break;
    case 'victory':
      [523, 659, 784, 1047, 1319].forEach((f, i) => setTimeout(() => tone(f, 0.2, 'square', 0.08), i * 100));
      break;
    case 'chime': // the great door unbars: three rising bell tones
      [784, 988, 1319].forEach((f, i) => setTimeout(() => tone(f, 0.35, 'triangle', 0.09), i * 160));
      break;
    case 'type':
      tone(800 + Math.random() * 200, 0.02, 'square', 0.025);
      break;
  }
}

function buildTrack(seq){ let t=0; const ev=[]; for(const [n,d] of seq){ if(n!=='R') ev.push({f:NF[n], t, d:d*MSPB}); t+=d*MSPB; } return {ev, len:t}; }

const M_LOOP = Math.max(M_TRACK.len, B_TRACK.len);
function musicNote(freq, start, dur, type, vol){
  if(!audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(0.0001, start);
  g.gain.exponentialRampToValueAtTime(vol, start + 0.012);   // quick harpsichord-like pluck
  g.gain.exponentialRampToValueAtTime(0.0001, start + dur * 0.95);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(start); o.stop(start + dur + 0.02);
}
let mBar = 0, mIdx = 0, bIdx = 0;
function scheduleMusic(){
  if(!audioCtx || audioCtx.state !== 'running' || !musicOn) return;
  const ahead = audioCtx.currentTime + 0.3;
  if(mBar === 0) mBar = audioCtx.currentTime + 0.15;
  while(mIdx < M_TRACK.ev.length && mBar + M_TRACK.ev[mIdx].t < ahead){
    const e = M_TRACK.ev[mIdx]; musicNote(e.f, mBar + e.t, e.d, 'triangle', 0.05); mIdx++;
  }
  while(bIdx < B_TRACK.ev.length && mBar + B_TRACK.ev[bIdx].t < ahead){
    const e = B_TRACK.ev[bIdx]; musicNote(e.f, mBar + e.t, e.d, 'square', 0.03); bIdx++;
  }
  if(mIdx >= M_TRACK.ev.length && bIdx >= B_TRACK.ev.length){ mBar += M_LOOP; mIdx = 0; bIdx = 0; }
}
setInterval(scheduleMusic, 60);

// === MINIGAME ===
function initMinigame() {
  mg = {
    player: { x: 50, y: 380, vx: 0, vy: 0, onGround: true, jumpCount: 0 },
    targets: [],
    endX: 5000,
    finished: false,
    result: '',
    levelTime: 0,
    scrollX: 0,
    given: 0
  };
  // Each figure is clearly labelled in drawMinigame. Worthy causes need only a small alms (£25);
  // spendthrifts demand ruinous sums (£1000-£2500) and corrode virtue.
  const worthy = ['family', 'hills', 'beggar', 'hospital'];
  const unworthy = ['harrel', 'gaming', 'fop'];
  let wi = 0, ui = 0, prevVice = false;
  for (let x = 650; x < 4800; ) {
    // Never two spendthrifts back-to-back, and keep them a touch rarer, so the
    // player always has a clear stretch to land and line up the next jump.
    const vice = !prevVice && Math.random() < 0.45;
    if (vice) {
      mg.targets.push({ x, y: 360, w: 56, h: 60, kind: 'unworthy', who: unworthy[ui++ % unworthy.length], cost: 1000 + Math.round(Math.random() * 3) * 500, hit: false });
    } else {
      mg.targets.push({ x, y: 380, w: 44, h: 44, kind: 'worthy', who: worthy[wi++ % worthy.length], cost: 25, given: false });
    }
    // Wider gaps overall, and extra run-up right after a spendthrift.
    x += (vice ? 460 : 340) + Math.random() * 120;
    prevVice = vice;
  }
}
const TARGET_NAME = { family: 'POOR FAMILY', hills: 'THE HILLS', beggar: 'A BEGGAR', hospital: 'HOSPITAL', harrel: 'MR. HARREL', gaming: 'GAMING DEN', fop: 'A FOP' };

function updateMinigame() {
  if (mg.finished) return;
  mg.levelTime++;
  // Movement
  if (keys['ArrowRight'] || keys['KeyD']) {
    mg.player.vx = Math.min(mg.player.vx + 0.6, 4.5);
  } else if (keys['ArrowLeft'] || keys['KeyA']) {
    mg.player.vx = Math.max(mg.player.vx - 0.6, -3);
  } else {
    mg.player.vx *= 0.75;
  }
  // Jump (with double jump)
  if (keyPressed('Space') || keyPressed('ArrowUp') || keyPressed('KeyW')) {
    if (mg.player.onGround) {
      mg.player.vy = -12;
      mg.player.onGround = false;
      mg.player.jumpCount = 1;
      playSound('jump');
    } else if (mg.player.jumpCount < 2) {
      mg.player.vy = -10;
      mg.player.jumpCount++;
      playSound('jump');
    }
  }
  // Gravity
  mg.player.vy += 0.6;
  if (mg.player.vy > 15) mg.player.vy = 15;
  mg.player.x += mg.player.vx;
  mg.player.y += mg.player.vy;
  // Ground
  if (mg.player.y > 380) {
    mg.player.y = 380;
    mg.player.vy = 0;
    mg.player.onGround = true;
    mg.player.jumpCount = 0;
  }
  // Bounds
  if (mg.player.x < 50) { mg.player.x = 50; mg.player.vx = 0; }
  // GIVE: Down / S to a WORTHY cause she is standing beside (alms = £25, +virtue)
  if (keyPressed('ArrowDown') || keyPressed('KeyS')) {
    for (const t of mg.targets) {
      if (t.given || t.kind !== 'worthy') continue;
      if (Math.abs((mg.player.x + 12) - (t.x + t.w / 2)) < 50 && stats.gold > 0) {
        t.given = true;
        applyGift(gameState(), 'worthy', t.cost);
        mg.given++;
        playSound('coin');
        break;
      }
    }
  }
  // SPENDTHRIFTS are obstacles: JUMP over them. Colliding lets them seize money (and virtue).
  // Forgiving hitbox: insets on both sides (so brushing past the edge is safe) and the
  // top ~22px of the figure is clippable, so the jump only has to clear the lower body.
  for (const t of mg.targets) {
    if (t.kind !== 'unworthy' || t.hit) continue;
    if (mg.player.x + 24 > t.x + 12 && mg.player.x + 6 < t.x + t.w - 12 && mg.player.y + 56 > t.y + 22) {
      t.hit = true;
      stats.gold = Math.max(0, stats.gold - t.cost);
      stats.virtue = Math.max(0, stats.virtue - 1);
      mg.player.vy = -7; mg.player.vx = -3;   // knocked back
      playSound('hurt');
    }
  }
  // Finish
  if (mg.player.x > mg.endX) {
    mg.player.x = mg.endX;
    mg.finished = true;
    mg.result = 'done';
    playSound('victory');
  }
  mg.scrollX = mg.player.x - 200;
}

// A Georgian 6-over-6 sash window: stone surround, white frame, pale glass, glazing bars.
function drawSashWindow(x, y, w, h) {
  fillRect(x - 3, y - 3, w + 6, h + 6, C.K);   // stone surround
  fillRect(x, y, w, h, C.w);                    // white sash frame
  fillRect(x + 2, y + 2, w - 4, h - 4, C.l);    // pale glass
  fillRect(x + w / 2 - 1, y + 2, 2, h - 4, C.w);          // central glazing bar
  fillRect(x + 2, y + Math.round(h / 3) - 1, w - 4, 2, C.w);
  fillRect(x + 2, y + Math.round(2 * h / 3) - 1, w - 4, 2, C.w);
}
// A little heap of gold coins spilling from the foot of a money bag.
function drawCoinSpill(cx, gy) {
  const coins = [
    [cx - 22, gy - 4], [cx - 12, gy + 1], [cx - 1, gy - 5], [cx + 9, gy],
    [cx + 19, gy - 3], [cx - 6, gy + 6], [cx + 5, gy + 6], [cx + 2, gy - 1]
  ];
  for (const [x, y] of coins) {
    fillRect(x, y + 7, 12, 3, C.a);     // contact shadow
    fillRect(x, y, 12, 8, C.x);         // coin rim (deeper gold)
    fillRect(x + 1, y + 1, 10, 5, C.g); // coin face (gold)
    fillRect(x + 3, y + 2, 4, 2, C.e);  // highlight
  }
}

    }
  }
  if (room.leaving) {
    room.fade++;
    if (room.fade >= 45) {                // ~0.75s fade, then the story resumes
      state = 'scene';
      currentSceneIdx = 12;               // Harrel's storm plea - linear flow from here
      keys['ArrowUp_p'] = keys['ArrowDown_p'] = keys['KeyW_p'] = keys['KeyS_p'] = false;
      keys['Space_p'] = keys['Enter_p'] = false;
      setupScene();
    }

  }
  if (room.doorFlash > 0) room.doorFlash--;

    if (room.talk.idx < room.talk.line.length) {
      room.talk.idx++;
      if (room.talk.idx % 3 === 0) playSound('type');
      if (keyPressed('Space') || keyPressed('Enter')) room.talk.idx = room.talk.line.length; // skip to full line
    } else if (keyPressed('Space') || keyPressed('Enter')) {
      room.talk = null;
    }
    return;
  }

  let dx = 0, dy = 0;
  if (keys['ArrowRight'] || keys['KeyD']) dx = SPD;
  else if (keys['ArrowLeft'] || keys['KeyA']) dx = -SPD;
  if (keys['ArrowDown'] || keys['KeyS']) dy = SPD;
  else if (keys['ArrowUp'] || keys['KeyW']) dy = -SPD;
  room.px = Math.max(30, Math.min(W - 30, room.px + dx));
  room.py = Math.max(310, Math.min(585, room.py + dy));
  room.moving = !!(dx || dy);

  const bump = nearNpc();
  if (bump && Math.abs(room.px - bump.x) < 45 && Math.abs(room.py - bump.y) < 30) {
    room.px = room.px < bump.x ? bump.x - 45 : bump.x + 45;
  }
  if (keyPressed('Space') || keyPressed('Enter')) {
    const atDoor = room.doorOpen && room.px > 345 && room.px < 455 && room.py < 330;
    if (atDoor) {
      playSound('select');
      room.leaving = true;
      return;
    }
    const n = nearNpc();
    if (n && !room.met[n.key]) {          // first meeting: detour into their scene
      playSound('select');
      room.pendingMeet = n.key;
      state = 'scene';
      currentSceneIdx = n.sceneIdx;

        if ((frame + i * 7) % 30 < 22) fillRect(lx, 110, 4, 6, C.y); // flame
      }
      fillRect(W / 2 - 4, 116, 8, 6, C.g);                  // central drop
      break;
    }
    case 'room': {
      // A Georgian drawing room (18th-c.): panelled plaster wall in bays with
      // rectangular fielded panels, dado rail, two curtained sash windows, a
      // pedimented grand double door in the centre, a stone chimneypiece with
      // lit fire, parquet floor as the walkable plane, gilt chandelier above.
      const WALL_B = 300;                                   // bottom of the back wall
      fillRect(0, 0, W, WALL_B, C.c);                       // plaster wall
      // panelled bays (ballroom pilaster rhythm, panels instead of mirrors)
      const bay = 160;
      for (let x = 0; x < W; x += bay) {
        fillRect(x + 12, 60, 14, WALL_B - 90, C.K);         // pilaster shaft
        fillRect(x + 14, 62, 4, WALL_B - 94, C.w);          // highlight
        fillRect(x + 8, 54, 22, 6, C.g);                    // gilt capital
        fillRect(x + 8, WALL_B - 34, 22, 6, C.g);           // base
        const px2 = x + 40, pw = bay - 56;                  // fielded panel in each bay
        if (px2 + pw < W) {
          fillRect(px2, 74, pw, 130, C.K);                  // panel moulding
          fillRect(px2 + 5, 79, pw - 10, 120, C.l);         // field
        }
      }
      fillRect(0, WALL_B - 28, W, 5, C.t);                  // dado rail
      fillRect(0, WALL_B - 4, W, 4, C.a);                   // skirting shadow
      // two curtained sash windows flanking the door (over the nearest panels)
      for (const wx of [150, 610]) {
        fillRect(wx - 14, 66, 12, 150, C.n);                // curtains
        fillRect(wx + 42, 66, 12, 150, C.n);
        fillRect(wx - 16, 62, 72, 8, C.g);                  // gilt pelmet
        drawSashWindow(wx, 74, 40, 118);
      }
      // grand double door, centred: pedimented surround, two six-panel leaves
      const DL = 345, DR = 455, DT = 140;                   // door left/right/top
      for (let s = 0; s < 16; s++) fillRect(DL - 14 + s, DT - 18 - s, (DR - DL) + 28 - s * 2, 2, C.K); // pediment
      fillRect(DL - 10, DT - 4, (DR - DL) + 20, 6, C.K);    // entablature
      fillRect(DL - 8, DT, 4, WALL_B - DT, C.K);            // jambs
      fillRect(DR + 4, DT, 4, WALL_B - DT, C.K);
      if (room && room.doorOpen) {
        fillRect(DL, DT, DR - DL, WALL_B - DT, C.k);        // dark hall beyond
        fillRect(DL, DT, 10, WALL_B - DT, C.t);             // leaves swung edge-on
        fillRect(DR - 10, DT, 10, WALL_B - DT, C.t);
      } else {
        for (const lx of [DL, DL + (DR - DL) / 2]) {        // two shut leaves
          const lw = (DR - DL) / 2;
          fillRect(lx, DT, lw, WALL_B - DT, C.t);
          fillRect(lx + 6, DT + 10, lw - 12, 40, C.a);      // three fielded panels each
          fillRect(lx + 6, DT + 58, lw - 12, 44, C.a);
          fillRect(lx + 6, DT + 110, lw - 12, 40, C.a);
        }
        fillRect(DL + (DR - DL) / 2 - 6, DT + 78, 4, 6, C.g); // brass knobs at the meeting stile
        fillRect(DL + (DR - DL) / 2 + 2, DT + 78, 4, 6, C.g);
      }
      // chimneypiece, left of the door: stone surround, mantel, flickering fire
      const fx = 40, fy = WALL_B - 118;
      fillRect(fx - 8, fy - 12, 96, 8, C.K);                // mantel shelf
      fillRect(fx - 4, fy, 8, 118 - 28, C.K);               // jambs
      fillRect(fx + 76, fy, 8, 118 - 28, C.K);
      fillRect(fx + 4, fy, 72, 118 - 28, C.k);              // firebox
      if ((frame % 24) < 16) fillRect(fx + 22, fy + 48, 36, 22, C.x); // embers
      fillRect(fx + 26, fy + 34 + ((frame % 14) < 7 ? 2 : 0), 28, 22, C.y); // flame flicker
      fillRect(fx + 34, fy + 24 + ((frame % 10) < 5 ? 3 : 0), 12, 14, C.w); // flame tip
      for (const cx of [fx + 2, fx + 66]) {                 // candlesticks on the mantel
        fillRect(cx, fy - 28, 4, 16, C.g);
        if ((frame + cx) % 30 < 22) fillRect(cx, fy - 34, 4, 6, C.y);
      }
      // parquet floor — the walkable plane (ballroom pattern, lower 1/2)
      for (let y = WALL_B; y < H; y += 24)
        for (let x = 0; x < W; x += 24)
          fillRect(x, y, 22, 22, (Math.floor(x / 24) + Math.floor(y / 24)) % 2 === 0 ? C.t : C.j);
      // gilt chandelier (ballroom's, hung below the HUD bar)
      fillRect(W / 2 - 2, 56, 4, 24, C.g);
      fillRect(W / 2 - 24, 78, 48, 6, C.g);
      fillRect(W / 2 - 38, 94, 76, 6, C.g);
      for (let i = 0; i < 9; i++) {
        const lx = W / 2 - 36 + i * 9;
        fillRect(lx, 84, 4, 18, C.g);
        if ((frame + i * 7) % 30 < 22) fillRect(lx, 100, 4, 6, C.y);
      }
      break;
    }
    case 'garden': {
      fillRect(0, 0, W, H - 150, C.z);
      fillRect(50, 40, 40, 40, C.g);
      fillRect(60, 30, 20, 60, C.g);
      fillRect(40, 50, 60, 20, C.g);
      fillRect(0, H - 250, W, 80, C.d);
      fillRect(0, H - 250, W, 15, C.v);
      for (let i = 0; i < 3; i++) {
        const tx = 100 + i * 300;
        fillRect(tx, H - 350, 80, 30, C.d);
        fillRect(tx - 5, H - 320, 90, 50, C.v);
        fillRect(tx + 30, H - 270, 20, 30, C.t);
      }
      fillRect(0, H - 150, W, 150, C.c);
      for (let i = 0; i < 15; i++) {
        const fx = (i * 67) % W;
        const fy = H - 130 + (i * 13) % 30;
        const colors = [C.F, C.p, C.m, C.y, C.r];
        fillRect(fx, fy, 8, 8, colors[i % 5]);
        fillRect(fx + 3, fy + 8, 2, 6, C.d);
      }
      break;
    }
    case 'storm': {
      fillRect(0, 0, W, H, '#202040');
      fillRect(0, 0, W, H/3, '#101030');
      if (frame % 50 < 3) {
        fillRect(W/2 - 5, 0, 10, 100, C.w);
        fillRect(W/2 - 20, 100, 40, 50, C.w);
        fillRect(W/2 - 30, 150, 60, 30, C.w);
      }
      for (let i = 0; i < 100; i++) {
        const rx = (i * 37 + frame * 8) % W;
        const ry = (i * 71 + frame * 15) % H;
        fillRect(rx, ry, 2, 8, C.l);
      }
      // A looming 18th-c. Palladian building in silhouette (a Bedlam-like madhouse):
      // symmetrical range, projecting centre with pediment and a cupola, dim windows.
      const bw = 460, bx = Math.round(W / 2 - bw / 2), by = 250, bh = 250;
      fillRect(bx, by, bw, bh, C.u);                        // main range
      fillRect(bx - 4, by - 6, bw + 8, 8, C.k);             // cornice
      const cw = 150, cxs = Math.round(W / 2 - cw / 2);
      fillRect(cxs, by - 18, cw, bh + 18, C.u);             // projecting centre
      fillRect(cxs - 6, by - 18, cw + 12, 6, C.k);
      for (let s = 0; s < 26; s++) fillRect(cxs - 6 + s, by - 18 - s, cw + 12 - s * 2, 2, C.u); // pediment
      fillRect(W / 2 - 18, by - 70, 36, 30, C.u);           // cupola drum
      for (let s = 0; s < 16; s++) fillRect(Math.round(W / 2 - 18 + s * 0.6), by - 70 - s, 36 - Math.round(s * 1.2), 2, C.u); // dome
      fillRect(W / 2 - 1, by - 94, 2, 8, C.o);              // finial
      for (let r = 0; r < 2; r++) for (let c = 0; c < 12; c++) { // dim, uneasy windows
        const wx = bx + 16 + c * 37, wy = by + 30 + r * 96;
        const lit = ((r * 12 + c + Math.floor(frame / 20)) % 7 === 0);
        fillRect(wx, wy, 16, 28, lit ? C.e : C.k);
      }
      fillRect(0, H - 50, W, 50, C.k);
      break;
    }
    case 'wedding': {
      // A Georgian church (St-Martin-in-the-Fields style, 18th-c.): a classical
      // temple front — six columns under a triangular pediment — with a tall
      // steeple rising behind, beneath a bright sky strewn with petals.
      fillRect(0, 0, W, H, C.z);
      fillRect(0, 0, W, H / 2, C.l);
      const cx = Math.round(W / 2);
      // --- steeple behind the portico ---
      fillRect(cx - 28, 70, 56, 240, C.K);                  // square tower
      fillRect(cx - 32, 66, 64, 7, C['+']);                 // tower cornice
      fillRect(cx - 26, 73, 52, 3, C.w);
      fillRect(cx - 10, 92, 20, 30, C.k);                   // belfry louvre
      fillRect(cx - 16, 134, 32, 12, C.c);                  // clock stage
      fillRect(cx - 6, 137, 12, 6, C.k);                    // clock face
      fillRect(cx - 6, 137, 6, 3, C.g);
      for (let s = 0; s <= 28; s++)                         // tapering spire
        fillRect(cx - 14 + Math.round(s * 0.4), 66 - s * 2, 28 - Math.round(s * 0.8), 2, C.K);
      fillRect(cx - 1, 6, 2, 8, C.g);                       // gilt finial
      // --- temple-front portico ---
      const pw = 260, px = cx - pw / 2, py = 222, ph = 228;
      fillRect(px - 8, py, pw + 16, ph, C.c);               // body
      fillRect(px - 16, py - 6, pw + 32, 10, C.K);          // entablature
      for (let s = 0; s < 28; s++)                          // pediment
        fillRect(px - 16 + s, py - 6 - s, pw + 32 - s * 2, 2, C.K);
      fillRect(px - 16, py - 6, pw + 32, 3, C.w);
      for (let c = 0; c < 6; c++) {                         // six columns
        const colx = Math.round(px + 12 + c * ((pw - 24) / 5));
        fillRect(colx, py + 14, 14, ph - 50, C.K);          // shaft
        fillRect(colx + 2, py + 16, 4, ph - 54, C.w);       // flute highlight
        fillRect(colx - 3, py + 8, 20, 6, C.c);             // capital
        fillRect(colx - 3, py + ph - 36, 20, 6, C.c);       // base
      }
      fillRect(cx - 30, py + ph - 112, 60, 112, C.a);       // arched doorway
      fillRect(cx - 24, py + ph - 102, 48, 98, C.t);
      fillRect(cx - 2, py + ph - 58, 4, 6, C.g);            // handle
      // ground, flowers, drifting petals
      fillRect(0, H - 100, W, 100, C.v);
      for (let i = 0; i < 30; i++) {
        const fx = (i * 47) % W, fy = H - 90 + (i * 17) % 20;
        const colors = [C.F, C.p, C.m, C.y];
        fillRect(fx, fy, 6, 6, colors[i % 4]);
      }
      for (let i = 0; i < 16; i++) {
        const ax = (i * 53 + frame) % W;
        const ay = (i * 31 + frame * 2) % (H - 130);
        fillRect(ax, ay, 4, 4, [C.p, C.w, C.y][i % 3]);
      }
      break;
    }
  }
}

function fmtGold(g) { return '£' + Math.round(g).toLocaleString('en-GB'); }
function drawHUD() {
  const S = 1.5, CH = 8 * S;                     // scale + monospace char advance (12px)
  const BAR = 60;
  fillRect(0, 0, W, BAR, C.k);
  fillRect(0, BAR, W, 4, C.w);
  // Group widths (label + gap + content), then center the whole row.
  const gap = 12, groupGap = 40;
  const heartPitch = 38, heartBox = 27;          // 25/18 at 1x, scaled 1.5x
  const pipPitch = 24, pipW = 18, pipH = 30;     // 16/12/20 at 1x, scaled 1.5x
  const goldStr = fmtGold(stats.gold);
  const wLove   = 4 * CH + gap + 4 * heartPitch + heartBox;
  const wGold   = 4 * CH + gap + goldStr.length * CH;
  const wVirtue = 6 * CH + gap + 5 * pipPitch + pipW;
  let x = Math.round((W - (wLove + groupGap + wGold + groupGap + wVirtue)) / 2);
  const textY = Math.round((BAR - CH) / 2);      // vertically centre 12px glyphs in the bar
  drawText('LOVE', x, textY, C.w, S, 'left', false);
  x += 4 * CH + gap;
  for (let i = 0; i < 5; i++) {
    if (i < stats.hearts) drawSprite(SP.heart, x + i * heartPitch, Math.round((BAR - heartBox) / 2), S);
    else fillRect(x + i * heartPitch, Math.round((BAR - heartBox) / 2), heartBox, heartBox, C.u);
  }
  x += 4 * heartPitch + heartBox + groupGap;
  drawText('GOLD', x, textY, C.g, S, 'left', false);
  x += 4 * CH + gap;
  drawText(goldStr, x, textY, C.g, S, 'left', false);
  x += goldStr.length * CH + groupGap;
  drawText('VIRTUE', x, textY, C.h, S, 'left', false);
  x += 6 * CH + gap;
  for (let i = 0; i < 6; i++) {
    fillRect(x + i * pipPitch, Math.round((BAR - pipH) / 2), pipW, pipH, i < stats.virtue ? C.v : C.u);
  }
}

function drawDialogue(scene) {
  if (!scene || (!scene.speaker && !scene.text)) return;
  const boxTop = 322, boxH = H - boxTop;   // taller box: 322..600
  const boxY = boxTop;
  fillRect(0, boxY, W, boxH, C.k);
  fillRect(0, boxY, W, 4, C.w);
  fillRect(0, boxY + boxH - 4, W, 4, C.w);
  fillRect(0, boxY, 4, boxH, C.w);
  fillRect(W - 4, boxY, 4, boxH, C.w);
  if (scene.speaker) {
    fillRect(20, boxY - 34, 360, 40, C.w);
    fillRect(25, boxY - 29, 350, 30, C.k);
    drawText(scene.speaker, 34, boxY - 22, C.g, 1.5, 'left', false);
  }
  const SIZE = 2, lineH = 30, maxChars = 44, padX = 30;
  const hasChoices = !!(scene.choices && visibleChoices(scene, gameState()).length);
  const lines = wrapText(displayText, maxChars);
  if (hasChoices) {
    // spoken line pinned to the top; choices go beneath it (never overlapping)
    const textTop = boxY + 22;
    for (let i = 0; i < lines.length; i++) {
      drawText(lines[i], padX, textTop + i * lineH, C.w, SIZE, 'left', false);
    }
    const fullLines = wrapText(fullText, maxChars).length;   // stable position even mid-typing
    choiceStartY = textTop + fullLines * lineH + 16;
  } else {
    // narration: vertically center the block so the box isn't half-empty
    const blockH = lines.length * lineH;
    const textTop = boxY + Math.max(22, (boxH - blockH) / 2 - 8);
    for (let i = 0; i < lines.length; i++) {
      drawText(lines[i], padX, textTop + i * lineH, C.w, SIZE, 'left', false);
    }
    if (textIdx >= fullText.length && Math.floor(frame / 30) % 2 === 0) {
      drawText('PRESS SPACE', W - 230, boxY + boxH - 36, C.g, 1.5, 'left', false);
    }
  }
}

// A themed strip of ground for the speaker to stand on, filling the gap between
// their feet (baseline) and the top of the dialogue box so they don't float.
function drawSpeakerGround(bg, top) {
  const bottom = 322;                 // meets the dialogue box
  const h = bottom - top;
  let face, edge, tex;
  switch (bg) {
    case 'garden':
    case 'manor':   face = C.v; edge = C.h;    tex = C.d; break;  // lawn / grass
    case 'london':  face = C.o; edge = C['+']; tex = C.k; break;  // stone pavement
    case 'storm':   face = C.u; edge = C.o;    tex = C.k; break;  // wet flagstones
    case 'ballroom':
    default:        face = C.t; edge = C.q;    tex = C.a; break;  // polished wood
  }
  fillRect(0, top, W, h, face);
  fillRect(0, top, W, 4, edge);                         // lit front edge of the floor
  if (bg === 'garden' || bg === 'manor') {
    for (let x = 0; x < W; x += 14) fillRect(x, top, 3, 5, tex);          // grass blades
  } else if (bg === 'london' || bg === 'storm') {
    fillRect(0, top + Math.floor(h / 2), W, 2, tex);                      // course joint
    for (let x = 18; x < W; x += 40) fillRect(x, top + 5, 2, h - 5, tex); // cobble seams
  } else {
    for (let x = 0; x < W; x += 48) fillRect(x, top + 5, 2, h - 5, tex);  // plank seams
  }
}

// Soft oval contact shadow so the figure reads as planted on the floor.
function drawContactShadow(cx, cy, spriteW) {
  ctx.save();
  ctx.globalAlpha = 0.28;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(cx, cy, spriteW * 0.42, 7, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// A single hand-scrawled "IOU" debt note (cream paper, ruled line, red lettering).
function drawIOUNote(cx, cy, rot) {
  const w = 34, h = 22;
  ctx.save();
  ctx.translate(Math.floor(cx), Math.floor(cy));
  ctx.rotate(rot);
  ctx.fillStyle = '#10101c'; ctx.fillRect(-w/2 - 2, -h/2 - 2, w + 4, h + 4); // outline
  ctx.fillStyle = C.c;       ctx.fillRect(-w/2, -h/2, w, h);                 // paper
  ctx.fillStyle = C.a;       ctx.fillRect(w/2 - 6, -h/2, 6, 6);             // folded corner
  ctx.fillStyle = C.q;       ctx.fillRect(-w/2 + 4, h/2 - 6, w - 8, 2);     // ruled line
  ctx.fillStyle = C.F;
  ctx.font = '9px "Press Start 2P", monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('IOU', 0, -2);
  ctx.restore();
}

// Harrel the spendthrift is hemmed in by his debts: notes drift around him,
// some behind, a couple fluttering at his feet in front of the figure.
function drawHarrelIOUs(front) {
  // [x, y, baseRot, isFront]
  const notes = [
    [322, 182, -0.26, false], [482, 170, 0.22, false],
    [330, 244, 0.16, false],  [474, 236, -0.18, false],
    [300, 208, 0.30, false],  [498, 206, -0.30, false],
    [362, 296, -0.12, true],  [442, 300, 0.16, true],
  ];
  for (let i = 0; i < notes.length; i++) {
    const [nx, ny, br, isFront] = notes[i];
    if (isFront !== front) continue;
    const driftY = Math.sin(frame * 0.04 + i) * 3;
    const wobble = Math.sin(frame * 0.03 + i) * 0.08;
    drawIOUNote(nx, ny + driftY, br + wobble);
  }
}

function drawFloyerSword() {
  // A gentleman's smallsword sheathed at the hip — fits Sir Robert Floyer, the
  // hot-tempered, duel-ready suitor. Positioned relative to the figure (drawn at
  // W/2, scale 5) and tracking the idle bob.
  const bob = Math.sin(frame * 0.05) * 1;
  const hx = W / 2 + 34;          // his left hip (viewer's right)
  const topY = 214 + bob;         // belt / hilt height
  // hilt: pommel, grip, crossguard
  fillRect(hx + 2, topY - 14, 6, 4, C.g);     // pommel (gold)
  fillRect(hx + 3, topY - 10, 4, 8, C.t);     // grip (brown)
  fillRect(hx - 2, topY - 2, 14, 4, C.g);     // crossguard (gold)
  // scabbard hanging down past the coat
  fillRect(hx + 2, topY + 2, 6, 44, C.a);     // scabbard body (dark brown)
  fillRect(hx + 4, topY + 2, 3, 44, C.t);     // scabbard highlight
  fillRect(hx + 2, topY + 46, 6, 6, C['+']);  // silver chape (tip)
}

function drawCharacter(charName) {
  if (!charName || !SP[charName]) return;
  const sprite = SP[charName];
  const maxW = Math.max(...sprite.map(r => r.length));
  const scale = 5;
  const x = (W - maxW * scale) / 2;
  // Stand every speaker on a common floor just above the dialogue box's speaker
  // label (label sits at ~288; box top is 322), so short (28-row) and tall
  // (32-row) sprites share a baseline and clear the box. Slight idle bob.
  const baseline = 284;
  const y = baseline - sprite.length * scale + Math.sin(frame * 0.05) * 1;
  drawSpeakerGround(currentScene.bg, baseline - 2);
  drawContactShadow(W / 2, baseline, maxW * scale);
  if (charName === 'harrel') drawHarrelIOUs(false);   // notes behind the figure
  drawSprite(sprite, x, y, scale, C, true);
  if (charName === 'harrel') drawHarrelIOUs(true);    // notes fluttering in front
  if (charName === 'floyer') drawFloyerSword();       // smallsword at his hip
}

function drawTitle() {
  const y = 80 + Math.sin(frame * 0.04) * 5;
  drawText('CECILIA', W/2, y, C.g, 6, 'center');
  drawText('A MARRIAGE QUEST', W/2, 170, C.w, 3, 'center');
  drawText('After the novel by Frances Burney', W/2, 215, C.c, 1, 'center');
  const ceciliaY = 255 + Math.sin(frame * 0.06) * 4;
  drawSprite(SP.cecilia, W/2 - (24 * 4) / 2, ceciliaY, 4, C, true);
  for (let i = 0; i < 3; i++) {
    const angle = frame * 0.03 + (i * 2 * Math.PI / 3);
    const hx = W/2 + Math.cos(angle) * 80;
    const hy = 350 + Math.sin(angle) * 20;
    drawSprite(SP.heart, Math.floor(hx), Math.floor(hy), 1);
  }
  if (Math.floor(frame / 30) % 2 === 0) {
    drawText('PRESS SPACE TO START', W/2, 460, C.w, 2, 'center');
  }
  drawText('A retro adventure in 8-bit', W/2, 540, C.c, 1, 'center');
}

function drawChoices(choices) {
  if (!choices || textIdx < fullText.length) return;
  const startY = choiceStartY || 430;
  const pitch = 40, bx = 50, bw = 700, bh = 34;
  for (let i = 0; i < choices.length; i++) {
    const cy = startY + i * pitch;
    const selected = i === choiceIdx;
    fillRect(bx, cy, bw, bh, selected ? C.n : C.k);
    fillRect(bx + 4, cy + 4, bw - 8, bh - 8, selected ? C.B : C.u);
    if (selected) drawText('►', bx + 14, cy + 11, C.y, 1.5, 'left', false);
    const csz = choices[i].text.length > 54 ? 1 : 1.5;           // long lines drop to the small font so they never overflow the button
    drawText(choices[i].text, bx + 44, cy + 11 + (csz === 1 ? 3 : 0), selected ? C.w : C.c, csz, 'left', false);
  }
}

function drawMinigame() {
  fillRect(0, 0, W, H, C.z);
  // Parallax clouds
  ctx.save();
  ctx.translate(-mg.scrollX * 0.3, 0);
  for (let i = 0; i < 8; i++) {
    drawSprite(SP.cloud, i * 400 + 50, 30 + (i % 3) * 50, 3);
  }
  ctx.restore();
  // Hills
  ctx.save();
  ctx.translate(-mg.scrollX * 0.5, 0);
  for (let i = 0; i < 20; i++) {
    fillRect(i * 200, 350, 150, 50, C.v);
    fillRect(i * 200, 340, 150, 15, C.d);
  }
  ctx.restore();
  // World
  ctx.save();
  ctx.translate(-mg.scrollX, 0);
  fillRect(0, 410, 6000, 190, C.q);
  fillRect(0, 410, 6000, 20, C.v);
  for (let x = 0; x < 6000; x += 60) {
    fillRect(x, 440, 60, 4, C.j);

  // End marker: Delvile Castle — stone towers behind a moat, drawbridge down to meet her

// === DELIRIUM CHASE ===
let chase = null;
function initChase() {
  const diff = chaseDifficulty(gameState());
  chase = {
    phase: 1,                 // 1 = carriage, 2 = foot
    t: 0,
    laneY: 300,               // Cecilia's carriage vertical position
    vy: 0,                    // vertical velocity (momentum steering)
    gap: 520,                 // distance to Delvile's carriage; smaller = closer (longer chase)
    obstacles: [],
    nextObs: 60,
    reach: 0,                 // phase 2: progress toward Delvile (0..100)
    overtaken: 0,             // phase 2: pursuers closing (0..100)
    diff,                     // catchability factor
    finished: false,
    caught: false,
    mad: false,
    outcome: null
  };
}
function updateChase() {
  if (chase.finished) return;
  chase.t++;
  if (chase.phase === 1) {
    // Steer up/down to dodge. Momentum model: the carriage has weight — it accelerates
    // into a turn and coasts to a stop, so steering feels responsive but not twitchy.
    const ACCEL = 8, MAXV = 10, FRICTION = 0.55;
    let dir = 0;
    if (keys['ArrowUp'] || keys['KeyW']) dir -= 1;
    if (keys['ArrowDown'] || keys['KeyS']) dir += 1;
    if (dir !== 0) chase.vy += ACCEL * dir;
    chase.vy *= FRICTION;                                       // damping: coasts to rest, caps top speed
    chase.vy = Math.max(-MAXV, Math.min(MAXV, chase.vy));
    chase.laneY += chase.vy;
    if (chase.laneY <= 100) { chase.laneY = 100; chase.vy = 0; } // hit a rail: kill momentum
    if (chase.laneY >= 480) { chase.laneY = 480; chase.vy = 0; } // wider playable lane
    // Spawn obstacles (a touch sparser and slower, so the road stays readable)
    if (--chase.nextObs <= 0) {
      chase.obstacles.push({ x: W + 20, y: 100 + Math.random() * 380, w: 40, h: 40, hit: false });
      chase.nextObs = 55 + Math.random() * 45;
    }
    for (const o of chase.obstacles) {
      o.x -= 5;
      if (!o.hit && o.x < 90 && o.x + o.w > 40 && Math.abs(o.y - chase.laneY) < 34) {
        o.hit = true; chase.gap += 40; chase.shakeUntil = chase.t + 18; playSound('hurt');   // crash widens the gap
      }
    }
    chase.obstacles = chase.obstacles.filter(o => o.x > -50);
    // Clean driving slowly closes the gap; lingering scales with diff.
    chase.gap -= 0.5 * chase.diff;
    if (chase.gap <= 0) { chase.phase = 2; playSound('select'); }     // caught up -> foot chase
    if (chase.t > 60 * 45) { chase.phase = 2; }                       // safety: cap phase 1 at ~45s
  } else {
    // Phase 2: mash Right/Space to reach him before the crowd overtakes her.
    chase.p2t = (chase.p2t || 0) + 1;
    if (keyPressed('ArrowRight') || keyPressed('Space') || keyPressed('KeyD')) chase.reach += 3;
    chase.reach += 0.25 * (chase.diff - 0.8);            // love makes him linger within reach
    if (chase.p2t > 90) chase.overtaken += 0.28;         // pursuers close in — after a moment to read the rules
    chase.reach = Math.max(0, chase.reach);
    if (chase.reach >= 100) { chase.caught = true; chase.finished = true; }
    else if (chase.overtaken >= 100) { chase.caught = false; chase.finished = true; }
    if (chase.finished) {
      if (chase.caught) flags.caughtDelvile = true;
      chase.outcome = resolveChase(chase.caught, gameState());
      chase.mad = (chase.outcome !== 'wish');   // broke down in the chase -> declared mad
      playSound(chase.caught ? 'victory' : 'hurt');
    }
  }
}
function chaseResultEnding() { return chase ? chase.outcome : null; }
// --- chase art helpers (resolution-relative) ---
function drawHorse(x, y, t, s) {
  const step = Math.sin(t * 0.4) > 0 ? 1 : -1;   // two-stride gallop
  fillRect(x, y, 18*s, 8*s, C.a);                 // body
  fillRect(x + 17*s, y - 4*s, 6*s, 8*s, C.a);     // neck
  fillRect(x + 22*s, y - 2*s, 7*s, 5*s, C.a);     // head
  fillRect(x + 16*s, y - 5*s, 3*s, 6*s, C.k);     // mane
  fillRect(x - 3*s, y + 1*s, 4*s, 7*s, C.k);      // tail
  fillRect(x + 4*s, y + 8*s, 3*s, 8*s + step*2*s, C.L);   // foreleg
  fillRect(x + 14*s, y + 8*s, 3*s, 8*s - step*2*s, C.L);  // hindleg
}
function drawCarriageRig(x, cabY, t, who, facing) {
  const s = Math.max(2, Math.round(H / 200));   // smaller rig: cab ~matches the dodge window, less clutter
  drawHorse(x + facing*30*s, cabY + 10*s, t, s);                    // team out front (in travel direction)
  fillRect(x + (facing > 0 ? 26*s : -2*s), cabY + 12*s, 2*s, 26*s, C.k); // pole
  fillRect(x, cabY, 30*s, 20*s, who === 'cecilia' ? C.P : C.L);     // cab body
  fillRect(x + 2*s, cabY + 4*s, 6*s, 6*s, C.e);                     // lit side lamp
  for (const wx of [x + 4*s, x + 24*s]) {                            // spoked wheels
    fillRect(wx, cabY + 20*s, 8*s, 8*s, C.k);
    fillRect(wx + 2*s, cabY + 22*s, 4*s, 4*s, C.o);
  }
  const sp = who === 'cecilia' ? SP.cecilia : SP.delvile;           // recognizable occupant
  drawSprite(sp, x + 6*s, cabY - 14*s, Math.max(2, s - 1), C, true);
}
function drawNightStreet(t) {
  fillRect(0, 0, W, H, C.n);                                   // night sky
  fillRect(W - 80, 30, 30, 30, C.c);                          // moon
  for (let i = 0; i < 6; i++) fillRect(i * (W/6), H*0.45, W/6 - 8, H*0.22, C.u); // terrace
  fillRect(W*0.55, H*0.30, 16, 40, C.u);                      // church steeple
  for (let i = 0; i < 8; i++) fillRect(20 + i*(W/8), H*0.5 + (i%2)*12, 6, 8, C.e); // lit windows
  for (const lx of [W*0.22, W*0.7]) { fillRect(lx, H*0.62, 4, 26, C.u); fillRect(lx - 6, H*0.58, 14, 12, C.e); } // gas lamps
  fillRect(0, H*0.66, W, H*0.34, C.a);                        // road
  for (let x = -(t*6) % 120; x < W; x += 120) fillRect(x, H*0.82, 16, 6, C.k); // cobbles
}
function drawDeliriumField(t, reachFrac, overFrac) {
  fillRect(0, 0, W, H, C.I);                       // pulsing blood-red base
  const cx = W/2, cy = H*0.42;
  ctx.strokeStyle = 'rgba(255,90,90,0.10)'; ctx.lineWidth = 2;   // concentric warp rings
  for (let i = 1; i <= 6; i++) { ctx.beginPath(); ctx.arc(cx, cy, i*34, 0, Math.PI*2); ctx.stroke(); }
  for (let i = 0; i < 40; i++) fillRect((i*53 + t*3) % W, (i*71) % H, 3, 3, C.r);   // drifting motes
  const press = overFrac * 30;                     // looming gossip-faces, pressing in as overtaken rises
  ctx.fillStyle = 'rgba(225,210,220,0.28)';
  ctx.beginPath(); ctx.ellipse(40 + press, H*0.6, 34, 42, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(W - 40 - press, H*0.62, 38, 46, 0, 0, Math.PI*2); ctx.fill();
  const vg = ctx.createRadialGradient(cx, H/2, H*0.3, cx, H/2, H*0.75);   // vignette
  vg.addColorStop(0, 'rgba(0,0,0,0)'); vg.addColorStop(1, 'rgba(0,0,0,0.55)');
  ctx.fillStyle = vg; ctx.fillRect(0, 0, W, H);
}
function drawChase() {
  if (chase.phase === 1) {
    drawNightStreet(chase.t);
    const sh = (chase.t < (chase.shakeUntil || 0)) ? (Math.random()*6 - 3) : 0;
    // Delvile ahead on a fixed mid-road lane; x derived from the gap
    const dx = Math.min(W - 140, W - 140 - Math.max(0, chase.gap));
    drawCarriageRig(dx + sh, H*0.55, chase.t, 'delvile', -1);
    // Cecilia (player) steers vertically via chase.laneY
    drawCarriageRig(40 + sh, chase.laneY, chase.t, 'cecilia', 1);
    for (const o of chase.obstacles) drawSprite(SP.scandal, o.x, o.y, 3);
    // instruction banner, charity-minigame style: name the obstacles so they read
    fillRect(W / 2 - 300, 18, 600, 40, C.k);
    fillRect(W / 2 - 300, 18, 600, 3, C.w);
    drawText('CHASE HIS CARRIAGE  -  ↑↓ STEER', W/2, 25, C.w, 1, 'center');
    drawText('DODGE THE SCANDAL SHEETS (RED) - GOSSIP SLOWS YOUR PURSUIT', W/2, 43, C.r, 1, 'center');
    fillRect(W - 260, 70, 230, 18, C.k);
    fillRect(W - 258, 72, 226 * (1 - Math.min(1, Math.max(0, chase.gap) / 320)), 14, C.v);
    drawText('CLOSING', W - 255, 72, C.w, 1, 'left', false);
  } else {
    const reachFrac = Math.min(1, chase.reach / 100);
    const overFrac  = Math.min(1, chase.overtaken / 100);
    drawDeliriumField(chase.t, reachFrac, overFrac);
    const shake = Math.sin(chase.t * 0.5) * 4;
    // Mortimer ahead: sharpens (alpha) and drifts toward centre as reach rises; dissolves with overtaken
    const dAlpha = Math.max(0, reachFrac - overFrac*0.6);
    const dmx = W*0.7 - reachFrac * W*0.18;
    ctx.save(); ctx.globalAlpha = 0.25 + 0.6*dAlpha;
    drawSprite(SP.delvile, dmx, H*0.42, 3, C, true);
    ctx.restore();
    // Cecilia running (her portrait), vertical bob + motion trail
    const cyB = H*0.42 + Math.sin(chase.t * 0.3) * 6;
    ctx.save(); ctx.globalAlpha = 0.25; drawSprite(SP.cecilia, W*0.34 - 20 + shake, cyB, 4, C, false); ctx.restore();
    ctx.save(); ctx.globalAlpha = 0.5;  drawSprite(SP.cecilia, W*0.34 - 8 + shake,  cyB, 4, C, false); ctx.restore();
    drawSprite(SP.cecilia, W*0.34 + shake, cyB, 4, C, true);
    drawText('MASH → OR SPACE - REACH HIM', W/2, 30, C.w, 2, 'center');
    drawText('BEFORE THE CROWD OVERTAKES YOU', W/2, 58, C.r, 1, 'center');
    // meters: REACH gold, OVERTAKEN dark-red
    fillRect(80, 120, 300, 22, C.k); fillRect(82, 122, 296 * reachFrac, 18, C.g);
    drawText('REACH DELVILE', 90, 124, C.w, 1, 'left', false);
    fillRect(80, 150, 300, 22, C.k); fillRect(82, 152, 296 * overFrac, 18, C.F);
    drawText('OVERTAKEN', 90, 154, C.w, 1, 'left', false);
  }
}

// === UPDATE ===
function update() {
  frame++;
  if (state === 'title') {
    if (keyPressed('Space') || keyPressed('Enter')) {
      playSound('select');
      state = 'scene';
      currentSceneIdx = 1;
      setupScene();
    }
  } else if (state === 'room') {
    updateRoom();
  } else if (state === 'scene') {
    if (textIdx < fullText.length) {
      textTimer++;
      if (textTimer % 1 === 0) {
        textIdx++;
        displayText = fullText.substring(0, textIdx);
        if (textIdx % 3 === 0) playSound('type');
      }
    } else {
      const vis = visibleChoices(currentScene, gameState());
      if (vis && vis.length) {
        if (keyPressed('ArrowUp')) { choiceIdx = (choiceIdx - 1 + vis.length) % vis.length; playSound('select'); }
        if (keyPressed('ArrowDown')) { choiceIdx = (choiceIdx + 1) % vis.length; playSound('select'); }
        if (keyPressed('Space') || keyPressed('Enter')) {
          const choice = vis[choiceIdx];
          if (choice.effect) choice.effect(gameState());
          playSound('select');
          if (currentScene.onContinue) currentScene.onContinue();
          else { currentSceneIdx++; setupScene(); }
        }
      } else {
        if (keyPressed('Space') || keyPressed('Enter')) {
          if (currentScene.onContinue) currentScene.onContinue();
          else { currentSceneIdx++; setupScene(); }
        }
      }
    }
  } else if (state === 'minigame') {
    updateMinigame();
    if (mg.finished) {
      if (keyPressed('Space') || keyPressed('Enter')) {
        state = 'scene';
        currentSceneIdx = mgReturnIdx;
        setupScene();
      }
    }
  } else if (state === 'chase') {
    updateChase();
    if (chase.finished && (keyPressed('Space') || keyPressed('Enter'))) {
      if (chase.outcome === 'wish') { state = 'scene'; currentSceneIdx = chaseReturnIdx; setupScene(); }
      else chooseEnding(chase.outcome);   // declared mad -> fixed 'survival' or 'asylum' ending (no wish menu)
    }
  } else if (state === 'ending') {
    if (textIdx < fullText.length) {
      textTimer++;
      if (textTimer % 1 === 0) {
        textIdx++;
        displayText = fullText.substring(0, textIdx);
        if (textIdx % 3 === 0) playSound('type');
      }
    } else {
      if (keyPressed('Space') || keyPressed('Enter')) {
        resetGame();
        state = 'title';
      }
    }
  }
}

// === DRAW ===
function draw() {
  fillRect(0, 0, W, H, C.k);
  if (state === 'title') {
    drawBackground('title');
    drawTitle();
  } else if (state === 'room') {
    drawRoom();
  } else if (state === 'scene') {
    drawBackground(currentScene.bg);
    if (currentScene.character) drawCharacter(currentScene.character);
    drawHUD();
    drawDialogue(currentScene);
    if (currentScene.choices) drawChoices(visibleChoices(currentScene, gameState()));
  } else if (state === 'minigame') {
    drawMinigame();
    if (mg.finished) {
      ctx.fillStyle = 'rgba(0,0,0,0.75)';
      ctx.fillRect(0, 0, W, H);
      drawText('YOU REACH DELVILE CASTLE', W/2, 220, C.g, 3, 'center');
      drawText('Press SPACE to continue', W/2, 320, C.w, 2, 'center');
    }
  } else if (state === 'chase') {
    drawChase();
    if (chase.finished) {
      ctx.fillStyle = 'rgba(0,0,0,0.75)'; ctx.fillRect(0, 0, W, H);
      const banner = chase.caught ? 'YOU REACH HIM' : (chase.mad ? 'DECLARED MAD' : 'HE IS LOST TO YOU');
      const bcol = chase.caught ? C.g : (chase.mad ? C.F : C.x);
      drawText(banner, W/2, 230, bcol, 3, 'center');
      drawText('Press SPACE', W/2, 320, C.w, 2, 'center');
    }
  } else if (state === 'ending') {
    drawBackground(currentScene.bg);
    drawHUD();
    // Title of ending
    if (currentScene.title) {
      fillRect(0, 64, W, 60, C.k);
      drawText(currentScene.title, W/2, 79, C.g, 3, 'center');
    }
    // Dialogue box for ending text
    const boxH = 280;
    const boxY = H - boxH - 20;
    fillRect(0, boxY, W, boxH, C.k);
    fillRect(0, boxY, W, 4, C.w);
    fillRect(0, boxY + boxH - 4, W, 4, C.w);
    fillRect(0, boxY, 4, boxH, C.w);
    fillRect(W - 4, boxY, 4, boxH, C.w);
    const lines = wrapText(displayText, 44);
    const lineH = 30;
    const maxLines = Math.floor((boxH - 36) / lineH);
    const startLine = Math.max(0, lines.length - maxLines);
    for (let i = startLine; i < lines.length; i++) {
      drawText(lines[i], 30, boxY + 22 + (i - startLine) * lineH, C.w, 2, 'left', false);
    }
    if (textIdx >= fullText.length) {
      if (Math.floor(frame / 30) % 2 === 0) {
        drawText('PRESS SPACE TO RESTART', W/2, H - 30, C.g, 2, 'center');
      }
    }
  }
  // CRT scanline overlay
  ctx.fillStyle = 'rgba(0,0,0,0.1)';
  for (let y = 0; y < H; y += 4) {
    ctx.fillRect(0, y, W, 2);
  }
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}
// === TEST SEAM: pure logic + a live-state view for browser-driven tests ===
// Verified by Playwright pure-logic suite (see cecilia-implementation-plan.md Task 3).
window.Cecilia = {
  blankGS, applyGift, shouldBreakDown, resolveWish, resolveBreakpoint, resolveChase, chaseDifficulty,
  resolveSceneText, visibleChoices, gameState, SCENES, clampVirtue, clampHearts,
  giveTo(kind) { return applyGift(gameState(), kind); },
  chaseResultEnding,
  endingKeys: Object.keys(ENDINGS),
  get live() { return { stats, suitors, flags, state, currentSceneIdx }; }
};
gameLoop();
